schema: finharness.support_surface_registry.v1
status: current
updated: "2026-07-02"
description: >
  Lifecycle registry for high-risk documentation and governance support
  surfaces. This is a support-debt control: it records owner, status,
  source-of-truth paths, review due date, and whether the surface is machine
  checked. It is intentionally small; add surfaces when drift recurs or when a
  PR creates a new long-lived support surface.
allowed_statuses:
  - current
  - reference
  - planned
  - historical
  - archive_candidate
  - downgrade_candidate
  - downgraded
  - retired
