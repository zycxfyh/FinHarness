schema: finharness.system_catalog.v3
status: current
updated: "2026-07-24"
allowed_statuses: [canonical, current, thin, scaffolded, legacy, planned, archived]
fact_ownership:
  system_ownership_and_lifecycle: docs/architecture/system-catalog.yml
  current_system_orientation: docs/current-system.md
  current_work_authorization: https://github.com/zycxfyh/FinHarness/issues
  product_objective: https://github.com/zycxfyh/FinHarness/issues/277
documentation:
  generated_views:
    - docs/architecture/framework-index.md
    - docs/architecture/module-map.md
  update_command: task docs:generate-current-views
  check_command: task docs:current-check
  navigation:
    entrypoints:
      - README.md
      - docs/README.md
    historical_roots:
      - docs/notes
      - docs/proposals
      - docs/reviews
      - docs/lessons
      - docs/think
    historical_paths:
      - docs/architecture/discipline-layer-baseline.md
systems:
  - id: shared_artifact_store
    name: Shared Artifact and Receipt Store
    status: current
    summary: Domain-neutral immutable-byte, descriptor, integrity-audit, index, and recovery ports. STORE-00 is live for new artifact forms; existing domain receipts migrate separately with replay and rollback proof.
    docs:
      - docs/architecture/artifact-store-contract.md
      - docs/architecture/import-provenance-contract.md
    runtime_roots:
      - src/finharness/artifact_store.py
      - src/finharness/import_provenance.py
      - src/finharness/statecore/receipt_io.py
    mature_posture: Domain services own semantics and authority; the store owns durability and integrity. Descriptors and bytes are truth, while indexes are reconstructable.
    checks:
      - uv run python -m unittest tests.test_artifact_store
    upgrade_trigger: Migrate an existing domain only with historical readability, replay comparison, rollback evidence, and no parallel registry.

  - id: product_north_star
    name: Product North Star
    status: current
    summary: Product category and long-term capability direction; current shipped capability and boundaries are owned separately by docs/current-system.md.
    docs:
      - README.md
      - docs/current-system.md
      - docs/product-north-star.md
      - docs/product/product-thesis.md
      - docs/product/product-roadmap.md
    runtime_roots:
      - README.md
      - docs/current-system.md
      - docs/product/
    mature_posture: Keep current capability separate from product direction; direction never authorizes work or proves shipped behavior.
    checks:
      - task docs:current-check
    upgrade_trigger: Public product surface or multi-user usage needs a formal product handbook.

  - id: state_core
    name: State Core
    status: current
    summary: Receipt-backed query mirror for personal capital state with exact Decimal ingestion, explicit UTC clocks, canonical identities, typed valuation/FX provenance, completeness findings, and immutable evidence roots.
    docs:
      - docs/architecture/system-map.md
      - docs/architecture/module-map.md
      - docs/architecture/import-provenance-contract.md
      - docs/architecture/canonical-capital-identities.md
      - docs/architecture/position-valuation-contract.md
      - docs/reference/interfaces.md
    runtime_roots:
      - src/finharness/statecore/
      - src/finharness/capital_import_contract.py
      - src/finharness/statecore/identities.py
      - src/finharness/position_valuation.py
      - src/finharness/personal_finance.py
      - src/finharness/beancount_adapter.py
      - src/finharness/api/routes_state.py
    mature_posture: Borrow event/receipt-sourcing ideas without adopting a heavy event platform.
    checks:
      - task test:all
    upgrade_trigger: Multiple stores or remote writers require a stronger event/log abstraction.

  - id: capital_map
    name: Capital Map
    status: current
    summary: Read-only exposure, daily brief, dashboard summary, and capital-state observations.
    docs:
      - docs/architecture/system-map.md
      - docs/tutorials/golden-path.md
    runtime_roots:
      - src/finharness/exposure.py
      - src/finharness/daily_brief.py
      - src/finharness/daily_change_brief.py
    mature_posture: BI/read-model pattern; FinHarness mirrors state and does not replace the ledger.
    checks:
      - task brief:daily
      - task decisions:scan
    upgrade_trigger: Repeated dashboard-specific calculations should move behind shared read models.

  - id: ips_policy
    name: IPS / Policy / Authority Credentials
    status: current
    summary: User-owned Investment Policy Statement, human-admin-only mandate/grant administration, immutable principal-bound CapitalMandate versions with append-only lifecycle resolution, and currency-aware mandate-bounded AgentAuthorityGrant credentials with dynamic validation and closed deny reasons.
    docs:
      - docs/architecture/capital-os-layering.md
      - docs/architecture/system-map.md
      - docs/adr/2026-07-02-capital-mandate-before-delegated-authority.md
      - docs/adr/2026-07-03-agent-authority-grants-are-mandate-bound-credentials.md
      - docs/architecture/versioned-capital-mandate.md
      - docs/architecture/replay-safe-agent-authority-grants.md
      - docs/adr/2026-07-17-human-only-authority-administration.md
    runtime_roots:
      - src/finharness/ips.py
      - src/finharness/api/routes_ips.py
      - src/finharness/authority_administration.py
      - src/finharness/statecore/capital_mandates.py
      - src/finharness/api/routes_capital_mandates.py
      - src/finharness/statecore/agent_authority_grants.py
      - src/finharness/api/routes_agent_authority_grants.py
    mature_posture: IdentityProvider assertions feed one closed domain-owned human-administration guard; they do not become capital authority by authentication alone. CapitalMandate versions and lifecycle events remain immutable principal-bound inputs. AgentAuthorityGrant stays exact-version/currency/scope bound, while Agent-runtime consumption remains separate from human administration and never grants execution authority.
    checks:
      - uv run python -m unittest tests.test_ips
      - uv run python -m unittest tests.test_capital_mandates
      - uv run python -m unittest tests.test_versioned_capital_mandates
      - uv run python -m unittest tests.test_agent_authority_grants
      - uv run python -m unittest tests.test_authority_administration tests.test_authority_administration_integration
      - uv run python -m unittest tests.test_statecore_store
    upgrade_trigger: Policy or grant rules become numerous, cross-language, need external audit reports, or future AuthorityContract work needs formal policy evaluation.

  - id: decision_workflow
    name: Decision Workflow
    status: current
    summary: Turns exposure and IPS thresholds into governed proposal review objects.
    docs:
      - docs/architecture/system-map.md
      - docs/tutorials/golden-path.md
    runtime_roots:
      - src/finharness/allocation.py
      - src/finharness/statecore/decision_scaffold.py
      - src/finharness/statecore/risk_classification.py
    mature_posture: RFC and decision-record style; human review remains authority.
    checks:
      - task decisions:scan
      - task test:all
    upgrade_trigger: More proposal generators need a shared candidate intake interface.

  - id: review_system
    name: Review System
    status: current
    summary: Append-only proposal review, attestation, compare marks, annual review, lesson-to-rule, deterministic review queue triage, and derived risk register v0.
    docs:
      - docs/architecture/system-map.md
      - docs/engineering/system-directory-standard.md
    runtime_roots:
      - src/finharness/statecore/proposals.py
      - src/finharness/review_read.py
      - src/finharness/risk_register.py
      - src/finharness/lesson_loop.py
      - src/finharness/rule_change_ledger.py
    mature_posture: Decision log plus risk/issue register discipline; attestation and risk severity hints are review evidence, not execution.
    checks:
      - task test:all
      - uv run python -m unittest tests.test_review_read tests.test_review_workspace_api
      - uv run python -m unittest tests.test_risk_register
    upgrade_trigger: Review flows become collaborative or need role/permission separation.

  - id: execution_kernel
    name: Execution Kernel
    status: canonical
    summary: Canonical deterministic execution lifecycle from OrderDraft through pre-trade, approval, staging, simulated submission, execution report, position delta, and reconciliation.
    docs:
      - docs/architecture/system-map.md
      - docs/architecture/closure-report.md
      - docs/reference/receipts.md
    runtime_roots:
      - src/finharness/statecore/execution_models.py
      - src/finharness/execution/
      - src/finharness/api/routes_execution.py
    mature_posture: Classical execution kernel with receipt-backed services, service-enforced immutable capabilities, and an adapter protocol; only simulated submission is enabled and real external execution remains absent.
    checks:
      - uv run python -m unittest tests.test_execution_schema
      - uv run python -m unittest tests.test_execution_services
      - uv run python -m unittest tests.test_routes_execution
      - uv run python -m unittest tests.test_execution_adapter_boundary
      - uv run python -m unittest tests.test_execution_lifecycle_hardening
      - uv run python -m unittest tests.test_execution_capability_enforcement
    upgrade_trigger: Any real broker, credential, network, or funded-account path requires a separate C3 design, threat model, capability enforcement, and human gate.

  - id: research_evidence
    name: Research Evidence
    status: current
    summary: Cite-only historical/descriptive evidence attached to candidates and proposals.
    docs:
      - docs/research/README.md
      - docs/reference/interfaces.md
    runtime_roots:
      - src/finharness/research_evidence.py
      - src/finharness/research_assets.py
      - src/finharness/research_enrichment.py
    mature_posture: Mature finance wheels provide calculations; FinHarness owns claims, redlines, and receipts.
    checks:
      - task hardening:redteam
    upgrade_trigger: Research workflows need repeatable experiment tracking or external lineage export.

  - id: external_data_mature_wheels
    name: External Data / Mature Wheels
    status: thin
    summary: Read-only data and mature-tool adapters; external outputs are evidence, not authority.
    docs:
      - docs/architecture/mature-wheel-control-plane.md
      - docs/wheels.md
    runtime_roots:
      - src/finharness/data_entry.py
      - src/finharness/market_data.py
      - src/finharness/providers/
      - src/finharness/portfolio_risk.py
      - src/finharness/data_quality.py
    mature_posture: Adopt-not-invent; use mature wheels for heavy calculation and scanning.
    checks:
      - task wheels:check
      - task test:all
    upgrade_trigger: Provider/data quality becomes a major operational pain or needs freshness SLAs.

  - id: agent_explanation
    name: Agent Explanation
    status: current
    summary: Profile-selected Agent tools over Capital OS context packs; AgentToolEntry metadata, agent_evidence.py, agent_context_projection.py, and agent_runtime.py map profiles to actual SDK tools with capability, toolset, side-effect, availability, evidence provider ids, profile-aware context budgets, visible/hidden/unavailable runtime facts, structured dispatch results/errors/evidence envelopes, and result budgets; default posture is read/explain, review-draft can create append-only governed proposal drafts, review-note can create append-only AgentReviewNoteDraft artifacts, scaffold-candidate can create append-only AgentScaffoldRevisionApplyCandidate artifacts from active risk register items without mutating proposals, system preflight recomputes candidate apply readiness, and preflight-bound human-confirmed apply can move those candidates through the proposal revision chain.
    docs:
      - docs/architecture/system-map.md
      - docs/reference/interfaces.md
    runtime_roots:
      - src/finharness/agent_capabilities.py
      - src/finharness/agent_context.py
      - src/finharness/agent_context_projection.py
      - src/finharness/agent_evidence.py
      - src/finharness/agent_runtime.py
      - src/finharness/agent_tool_entries.py
      - src/finharness/agent_tools.py
      - src/finharness/scaffold_candidate_preflight.py
      - src/finharness/review_read.py
      - src/finharness/proposal_queue_checks.py
      - src/finharness/hermes_bridge.py
    mature_posture: Hermes-style spec, availability, dispatch wrapper, output-budget, toolset registry, and capability-profile ideas; ToolEntry availability and profiles are diagnostics/visibility, not permission bypasses.
    checks:
      - uv run python -m unittest tests.test_agent_proposal_drafts
      - uv run python -m unittest tests.test_agent_review_note_drafts
      - uv run python -m unittest tests.test_agent_scaffold_revision_candidates
      - uv run python -m unittest tests.test_scaffold_candidate_preflight
      - uv run python -m unittest tests.test_scaffold_candidate_apply
      - uv run python -m unittest tests.test_agent_context_projection
      - uv run python -m unittest tests.test_agent_evidence
      - uv run python -m unittest tests.test_agent_runtime
      - uv run python -m unittest tests.test_agent_capabilities
      - uv run python -m unittest tests.test_agent_context
      - uv run python -m unittest tests.test_agent_tools
    upgrade_trigger: Agent scaffold-revision, simulation, approval-prep, or any stronger action path needs explicit profiles, tests, and receipt-backed command paths; execution remains absent.

  - id: agent_cognition_runtime
    name: Agent Cognition Runtime / Work Orchestrator
    status: current
    summary: The bounded read/explain cycle remains, plus a thin personal-capital core with immutable Constitution, durable Mission/checkpoint/resume, selected Beliefs, bounded single-principal Delegation, world-bound simulated Effects, a recoverable Rust Job/Attempt Runtime, and one loopback-only Agent Shell. The shell now exposes explicit World-drift inspection and keyed checkpoint/resume, dual-mode process-restart recovery, a multilingual provider-redline corpus, and a real Chromium product journey. Hosted acceptance uses a persisted deterministic Runtime observation when systemd is unavailable; the capable-host acceptance separately proves the real Rust/systemd path. Scheduler, multi-user hosting, multi-Agent governance, and live external effects are absent.
    docs:
      - docs/architecture/agent-native-target-space.md
      - docs/architecture/agent-operating-surface.md
      - docs/architecture/agent-work-loop-plan.md
    runtime_roots:
      - src/finharness/agent_shell.py
      - src/finharness/api/routes_agent_shell.py
      - src/finharness/api/identity_mutation_reconciliation.py
      - src/finharness/agent_shell_provider_redline_eval.py
      - scripts/agent_shell_fixture_runtime.py
      - scripts/serve_local_agent.py
      - frontend-agent/
      - src/finharness/capital_agent.py
      - src/finharness/capital_runtime.py
      - src/finharness/runtime_worker.py
      - crates/finharness-runtime/
      - src/finharness/agent_cognition_flow.py
      - src/finharness/agent_run_receipts.py
      - src/finharness/agent_runtime_receipts.py
      - src/finharness/agent_tool_registry.py
      - src/finharness/agent_tool_availability.py
      - src/finharness/agent_tool_result_envelope.py
      - src/finharness/agent_context_trust_map.py
      - src/finharness/agent_receipt_search.py
      - src/finharness/domain_memory.py
      - src/finharness/playbook_loader.py
      - src/finharness/evaluator_registry.py
      - src/finharness/agent_operating_flow.py
      - src/finharness/review_workspace.py
      - src/finharness/agent_work_loop.py
    mature_posture: Python owns capital and Agent semantics; the local Agent Shell only orchestrates authenticated product journeys. A domain-neutral typed-reconciliation registry dispatches to Proposal and Agent handlers without making either route module the global owner. The transplanted Rust kernel owns execution identity, idempotency, process lifecycle, bounded Artifacts, and recovery. Paper Effects survive both acknowledgement loss and API-process death after Runtime completion without redispatch. Mission World drift requires an explicit checkpoint/resume before another Effect. Registered operations prevent model-selected executables or environment, browser sessions never receive provider secrets, and broker/capital reconciliation remain domain-owned.
    checks:
      - task test:all
      - task test:pytest
      - uv run python scripts/run_agent_operating_surface_smoke.py
      - uv run python scripts/run_agent_work_loop_smoke.py
      - uv run python scripts/run_capital_agent_core_acceptance.py
      - task test:runtime
      - task acceptance:capital-runtime
      - task acceptance:agent-shell
      - task acceptance:agent-shell-process-recovery
      - task acceptance:agent-shell-provider-redlines
      - task test:browser
    upgrade_trigger: Add scheduling, concurrent reservation, multi-principal governance, non-trade effects, Observer Agents, or live authority only after concrete dogfood exposes that need.

  - id: agent_autonomy_control
    name: Agent Autonomy Control Plane
    status: current
    summary: Deterministic Harness admission vocabulary and evaluator across W0-W4 world fidelity and AUT0-AUT6 autonomy, with a compatibility adapter for CapitalMandate and AgentAuthorityGrant. Every Agent work-loop dispatch crosses admission and persists non-executing evidence in the AUT2 terminal chain; effect commands remain outside this integration.
    docs:
      - docs/modules/agent-autonomy-control.md
      - docs/adr/2026-07-11-agent-native-control-ownership.md
    runtime_roots:
      - src/finharness/autonomy_control.py
      - src/finharness/agent_autonomy_adapter.py
      - src/finharness/agent_work_loop.py
    mature_posture: Keep admission local, typed, deterministic, and provider-neutral. Consider an external policy engine only after rule volume or multi-runtime consistency creates measured pressure.
    checks:
      - uv run python -m unittest tests.test_autonomy_control
      - uv run python -m unittest tests.test_autonomy_statecore_adapter
      - task agent:work-loop-acceptance-report
    upgrade_trigger: Bind verified world versions and action-specific limit evaluators before AUT3; integrate effect commands only through separate AUT4/AUT5 authority programs.

  - id: cockpit_api
    name: Cockpit / API
    status: current
    summary: Local read/review product surface for state, proposals, review, IPS, capital mandates, agent authority grant validation, and cockpit views.
    docs:
      - docs/architecture/system-map.md
      - docs/reference/interfaces.md
    runtime_roots:
      - src/finharness/api/
      - frontend/
    mature_posture: Thin adapter and view-contract discipline; avoid heavy frontend framework until needed.
    checks:
      - task test:frontend
      - task test:all
    upgrade_trigger: Product surface complexity exceeds vanilla JS locality.

  - id: engineering_assurance
    name: Engineering Assurance
    status: thin
    summary: Direct tests, architecture boundaries, exact-head CI, secret scanning, targeted fuzzing, and Git rollback protect current product behavior without a parallel governance state system.
    docs:
      - docs/current-system.md
      - docs/architecture/system-catalog.yml
      - docs/security/finharness-threat-model.md
    runtime_roots:
      - .github
      - data/security
      - src/finharness/hardening.py
      - src/finharness/repo_intelligence.py
      - scripts/check_architecture_boundaries.py
      - scripts/check_keyed_mutation_route_capabilities.py
      - scripts/run_fuzz_baseline.py
    mature_posture: Use direct executable evidence and retain hard blockers only for non-recoverable consequences.
    checks:
      - task check
      - task docs:current-check
      - task hardening:redteam
      - task security:scan
      - task security:fuzz
    upgrade_trigger: Add a mechanism only after a repeated observed failure survives direct tests, Git recovery, backup, receipt, or reconciliation.
