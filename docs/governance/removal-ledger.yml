schema: finharness.removal_ledger.v1
status: current
updated: "2026-07-02"
description: >
  Governed ledger for delete, archive, deprecate, and downgrade decisions.
  Deletion is not an invisible cleanup action: every non-trivial removal records
  target, action, reason, replacement, owner, status, and required checks.
allowed_actions:
  - delete
  - archive
  - deprecate
  - downgrade
allowed_statuses:
  - proposed
  - approved
  - done
  - reverted
entries:
  - id: delete-stale-support-governance-graphs-doc
    target:
      - docs/architecture/support-governance-graphs.md
    action: delete
    reason: >
      The document claimed archived graphs lived under docs/archive/legacy-graphs,
      but that path does not exist and the graph registry is now the source of
      truth for graph lifecycle status. Keeping a stale current-looking support
      doc creates support surface drift.
    replacement:
      - tests/_graph_registry.py
      - docs/architecture/graph-rationalization-audit.md
      - task governance:graphs
    owner: eos
    proposed_in_pr: unsubmitted
    effective_pr: unsubmitted
    status: done
    remove_from_current_nav: true
    checks_required:
      - task docs:current-check
      - uv run python -m unittest tests.test_removal_ledger
  - id: downgrade-stale-operator-guide-to-pointer
    target:
      - docs/GUIDE.md
    action: downgrade
    reason: >
      The old guide preserved useful operator context but occupied a current-looking
      top-level path while describing archived commands, broker experiments, and
      the retired ten-layer trading chain. Keeping the full stale guide in place
      made onboarding and authority boundaries harder to trust.
    replacement:
      - docs/README.md
      - docs/tutorials/golden-path.md
      - docs/architecture/capital-os-layering.md
      - docs/reference/commands.md
      - docs/reference/interfaces.md
      - docs/reference/receipts.md
      - docs/archive/ten-layer-trading-chain
    owner: eos
    proposed_in_pr: unsubmitted
    effective_pr: unsubmitted
    status: done
    remove_from_current_nav: true
    checks_required:
      - task docs:current-check
      - uv run python -m unittest tests.test_removal_ledger
  - id: downgrade-industry-benchmark-series-to-historical-reference
    target:
      - docs/architecture/industry-benchmark
    action: downgrade
    reason: >
      The 2026-06-15 benchmark series contains useful planning analysis, but its
      current-state and roadmap language predates the Capital OS re-layering,
      ActionIntent/Simulation/TradePlan path, CapitalMandate, graph retirement,
      and documentation support controls. Keeping it as an authoritative current
      fact source would create architecture drift.
    replacement:
      - docs/architecture/framework-index.md
      - docs/architecture/capital-os-layering.md
      - docs/architecture/system-map.md
      - docs/architecture/module-map.md
      - docs/architecture/system-catalog.yml
      - docs/reference/commands.md
    owner: eos
    proposed_in_pr: unsubmitted
    effective_pr: unsubmitted
    status: done
    remove_from_current_nav: true
    checks_required:
      - task docs:current-check
      - uv run python -m unittest tests.test_removal_ledger

  - id: downgrade-capital-action-intent-to-legacy
    target:
      - docs/architecture/system-map.md#6-capital-action-intent
      - docs/architecture/capital-os-layering.md#l6-legacy
      - src/finharness/api/routes_action_intents.py
    action: downgrade
    reason: >
      ActionIntent chain (ActionIntent → AuthorityBinding → SimulationReport →
      TradePlanCandidate → CapitalObjectiveFit → TradePlanReviewGate) superseded
      by Execution Kernel (OrderDraft → PreTradeCheck → ApprovalRecord →
      ExecutionOrder → ExecutionReport). Old objects preserved as readable
      receipts; new callers use /execution/* routes. Separation bridge at
      execution/legacy_bridge.py.
    replacement:
      - src/finharness/statecore/execution_models.py
      - src/finharness/execution/services.py
      - src/finharness/api/routes_execution.py
      - src/finharness/execution/legacy_bridge.py
    owner: execution
    proposed_in_pr: '123'
    status: done
    remove_from_current_nav: false
    checks_required:
      - uv run python -m unittest tests.test_execution_legacy_bridge

  - id: downgrade-paper-validation-to-legacy
    target:
      - docs/architecture/system-map.md#7-paper-validation-runtime
      - src/finharness/api/routes_paper_validation.py
    action: downgrade
    reason: >
      Paper validation (PaperOrderTicketCandidate → PaperExecutionReceipt →
      PaperAccount → PaperPosition) superseded by Execution Kernel. Paper
      order/execution/account shapes projected via legacy_bridge.py.
    replacement:
      - src/finharness/execution/adapters/simulated_broker.py
      - src/finharness/execution/broker.py
      - src/finharness/execution/commands.py
      - src/finharness/execution/legacy_bridge.py
    owner: execution
    proposed_in_pr: '123'
    status: done
    remove_from_current_nav: false
    checks_required:
      - uv run python -m unittest tests.test_execution_legacy_bridge
      - uv run python -m unittest tests.test_simulated_broker_submit
