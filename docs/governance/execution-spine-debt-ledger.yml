schema: finharness.execution_spine_debt_ledger.v1
status: current
updated: "2026-07-08"
description: >
  Machine-readable debt ledger for the Execution Spine paydown program.
  Each debt item is categorized by layer, prioritized, and linked to a
  candidate PR. This is a planning artifact, not a runtime check.

allowed_priorities: [high, medium, low]
allowed_layers:
  - classical_execution
  - legacy_shadow_surface
  - agentic_artifacts
  - control_safety
  - docs_product_truth
  - registry_inventory
  - ci_devex

debts:
  # ── CI / DevEx ──────────────────────────────────────────────────────
  - id: DEBT-CI-001
    layer: ci_devex
    category: flaky_test
    artifact: test_catalog_entry_includes_quality_freshness_fields
    problem: >
      Market data freshness test repeatedly fails with 'stale' != 'fresh',
      causing security workflow to stay red across all PRs.
    desired_state: >
      Test uses fixed fixture, frozen clock, mocks freshness window, or is
      moved to optional integration suite.
    priority: high
    candidate_pr: 126
    blocked_by: []

  - id: DEBT-CI-002
    layer: ci_devex
    category: browser_test
    artifact: browser-golden-paths cockpit smoke
    problem: >
      Browser golden path tests may fail due to selector changes, tab count,
      or startup timing. Execution tab added in #120 needs to be in stable
      golden path.
    desired_state: >
      Browser golden paths green, or correctly marked as non-blocking optional.
      Execution tab in stable test path.
    priority: high
    candidate_pr: 127
    blocked_by: []

  # ── Registry / Inventory ────────────────────────────────────────────
  - id: DEBT-REG-001
    layer: registry_inventory
    category: inventory_stale
    artifact: docs/engineering/abstraction-inventory.yml
    problem: >
      #114 inventory predates Execution Kernel (#116-#124). New execution
      models, services, adapter, routes, and bridge are not classified.
    desired_state: >
      BrokerConnection, ExecutionAccount, OrderDraft, PreTradeCheck,
      ApprovalRecord, ExecutionOrder, ExecutionReport, PositionDelta,
      ReconciliationReport classified. Legacy chain marked as
      deletion_candidate.
    priority: high
    candidate_pr: 128
    blocked_by: []

  - id: DEBT-REG-002
    layer: registry_inventory
    category: route_registry_stale
    artifact: route taxonomy
    problem: >
      /execution/* canonical routes and /action-intents/* /paper-validation/*
      legacy routes not aligned in a single route registry.
    desired_state: >
      /execution/* = canonical, /action-intents/* = legacy_internal,
      /paper-validation/* = legacy_internal. No new callers on legacy.
    priority: high
    candidate_pr: 129
    blocked_by: []

  - id: DEBT-REG-003
    layer: registry_inventory
    category: write_registry_stale
    artifact: receipt-backed-write-registry.json
    problem: >
      Write registry does not include new /execution/* POST routes or
      distinguish canonical vs legacy writes.
    desired_state: >
      canonical_write: /execution/order-drafts, .../pretrade-checks,
      .../approvals, .../stage, .../submit. legacy_write: /action-intents/*,
      /paper-validation/*.
    priority: high
    candidate_pr: 130
    blocked_by: []

  - id: DEBT-REG-004
    layer: registry_inventory
    category: receipt_registry_stale
    artifact: docs/reference/receipts.md
    problem: >
      Receipt reference does not list execution.* receipt kinds (#117).
      Old not_* protection receipt rows still present as active.
    desired_state: >
      execution.* receipts documented; state_core_action_intent_* marked
      legacy; not_* protection receipts deprecated.
    priority: medium
    candidate_pr: 131
    blocked_by: []

  # ── Legacy Shadow Surface ───────────────────────────────────────────
  - id: DEBT-LEG-001
    layer: legacy_shadow_surface
    category: duplicate_concept
    artifact: TradePlanReviewGate vs ApprovalRecord, PaperOrderTicket vs ExecutionOrder
    problem: >
      Old ActionIntent/PaperValidation objects represent the same concepts
      as new Execution Kernel objects but with different names and extra
      negative protection baggage.
    desired_state: >
      Old objects marked legacy. New callers use Execution Kernel.
      Migration path via legacy_bridge.py documented.
    priority: high
    candidate_pr: 132
    blocked_by: []

  - id: DEBT-LEG-002
    layer: legacy_shadow_surface
    category: bridge_as_product
    artifact: src/finharness/execution/pretrade_packet.py (#115)
    problem: >
      PreTradePacket is a legacy projection bridge, not a canonical product
      API. It should not be documented as a user-facing path.
    desired_state: >
      Docs clear that PreTradePacket is legacy projection only,
      not canonical execution packet.
    priority: medium
    candidate_pr: 133
    blocked_by: []

  - id: DEBT-LEG-003
    layer: legacy_shadow_surface
    category: missing_deprecation_warning
    artifact: src/finharness/api/routes_action_intents.py, routes_paper_validation.py
    problem: >
      Legacy routes marked as no_new_callers only in docstrings.
      No runtime signal (header, response metadata) to API consumers.
    desired_state: >
      Legacy routes include X-FinHarness-Legacy-Surface header or
      response metadata flag.
    priority: medium
    candidate_pr: 134
    blocked_by: []

  # ── Agentic Artifacts ───────────────────────────────────────────────
  - id: DEBT-AGT-001
    layer: agentic_artifacts
    category: classification_no_enum
    artifact: src/finharness/execution/legacy_bridge.py
    problem: >
      AgenticArtifact.kind is a free-form string. Not machine-verifiable.
    desired_state: >
      kind uses enum: context, skill_output, workflow_output,
      evaluator_finding, permission_trace, review_memo, trace.
    priority: medium
    candidate_pr: 135
    blocked_by: []

  - id: DEBT-AGT-002
    layer: agentic_artifacts
    category: single_value_projection
    artifact: ExecutionProjection fields (#121 fix pending)
    problem: >
      Original #121 used single-value projections that would overwrite
      on multi-gate/ticket/report chains. Fixed in follow-up but needs
      multi-projection test coverage.
    desired_state: >
      All projection fields are lists. Tests cover multi-item chains.
    priority: medium
    candidate_pr: 136
    blocked_by: []

  # ── Classical Execution ─────────────────────────────────────────────
  - id: DEBT-CLS-001
    layer: classical_execution
    category: lifecycle_state_transition
    artifact: execution services
    problem: >
      No explicit tests for invalid state transitions: reject staging a
      rejected draft, reject submitting a non-staged order, verify fill
      status update.
    desired_state: >
      Tests cover: cannot stage rejected draft, cannot submit non-staged
      order, filled report updates status, partial fill behavior.
    priority: medium
    candidate_pr: 137
    blocked_by: []

  - id: DEBT-CLS-002
    layer: classical_execution
    category: receipt_contract
    artifact: execution services + receipts
    problem: >
      Receipt refs, idempotency, and cross-reference contracts not
      systematically verified.
    desired_state: >
      Every service writes receipt. Receipt refs include source ids.
      submit_attempted precedes submitted. ExecutionOrder.receipt_ref
      persisted. Report receipt linked to order.
    priority: medium
    candidate_pr: 138
    blocked_by: []

  - id: DEBT-CLS-003
    layer: classical_execution
    category: adapter_boundary
    artifact: execution/broker.py + adapters/
    problem: >
      Adapter boundary only relies on convention: no explicit test that
      only simulated adapters are registered, no network dependency check.
    desired_state: >
      Test confirms: registered adapters == simulated only.
      network_enabled=false. credential_ref is None. No external
      SDK dependency.
    priority: medium
    candidate_pr: 139
    blocked_by: []

  # ── Control / Safety ────────────────────────────────────────────────
  - id: DEBT-CTL-001
    layer: control_safety
    category: scattered_capability
    artifact: execution capabilities
    problem: >
      Execution capability is implicit: WriteCapability from API
      deps, simulated adapter registration by convention, no unified
      capability model.
    desired_state: >
      Minimal ExecutionCapabilities model: create_order_draft,
      run_pretrade_check, record_approval, stage_execution_order,
      submit_simulated_order (true), submit_live_order (false),
      manage_broker_credentials (false).
    priority: medium
    candidate_pr: 140
    blocked_by: []

  - id: DEBT-CTL-002
    layer: control_safety
    category: adapter_registration_gap
    artifact: execution/broker.py
    problem: >
      register_broker_adapter accepts any adapter without checking
      environment or adapter kind. No guard against registering
      non-simulated adapters.
    desired_state: >
      Registration validates adapter_kind == "simulated" unless
      explicit live capability exists. Test confirms no real adapter
      registration.
    priority: medium
    candidate_pr: 141
    blocked_by: []

  # ── Docs / Product Truth ────────────────────────────────────────────
  - id: DEBT-DOC-001
    layer: docs_product_truth
    category: stale_protection_language
    artifact: docs (various)
    problem: >
      Residual not_* protection language, execution_allowed=false
      theology, and old candidate-only mainline descriptions still
      present in some docs.
    desired_state: >
      Dead protection docs deleted. Remaining docs reference
      Execution Kernel canonical mainline.
    priority: medium
    candidate_pr: 142
    blocked_by: [DEBT-REG-001, DEBT-REG-002, DEBT-LEG-001]
