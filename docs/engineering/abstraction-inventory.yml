# FinHarness Abstraction Inventory
# 把现有复杂度按 Object / Tool / Resource / Context / Skill / Workflow /
# Loop / Evaluator / Guardrail / Permission / Trace 重新分类。
#
# 这一步不改 runtime，只做认知归位。
# 原则: 先归类，后桥接，再迁移，最后删除。

schema: finharness.abstraction_inventory.v1
status: current
updated: "2026-07-08"
description: >
  Stabilization-phase inventory mapping every existing complex artifact to its
  correct abstraction layer.  Each entry records current_form,
  better_abstraction, target_form, migration_path, delete_condition, and
  risk_if_left_as_object.
principles_ref: docs/engineering/agentic-abstraction-principles.md

