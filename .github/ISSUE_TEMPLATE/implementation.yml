name: Implementation / change
description: Deliver one bounded user or system result. Use a blank issue for simpler notes.
title: "Change: "
labels:
  - type:feature
body:
  - type: textarea
    id: outcome
    attributes:
      label: Result
      description: What should become possible, correct, or simpler?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Name the relevant boundary and any important non-goal.
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: Give the smallest observable completion condition.
    validations:
      required: true
  - type: textarea
    id: consequence
    attributes:
      label: Persistent or external consequence
      description: Fill this only when the change affects persistent state, credentials, deployment, money, publishing, or another hard-to-recover effect. Include recovery or revocation.
