name: Architecture / ADR
description: Record a durable boundary decision whose rationale must outlive implementation.
title: "ADR: "
labels:
  - type:adr
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What durable ambiguity or boundary needs a decision?
    validations:
      required: true
  - type: textarea
    id: decision
    attributes:
      label: Decision
      description: State the chosen boundary and the alternatives that materially matter.
    validations:
      required: true
  - type: textarea
    id: consequences
    attributes:
      label: Consequences
      description: Note important trade-offs, hard-to-reverse effects, or recovery needs. Leave blank when none apply.
