name: Bug / regression
description: Report behavior that is incorrect or unexpectedly regressed.
title: "Bug: "
labels:
  - bug
  - type:feature
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction or evidence
      description: Add the smallest useful command, input, trace, screenshot, or failing path when available.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: consequence
    attributes:
      label: Persistent or external consequence
      description: Note data loss, credential exposure, external effects, or recovery needs only when relevant.
