name: Deferred capability
description: Record something worth revisiting later without authorizing work now.
title: "Deferred: "
labels:
  - type:deferred-gate
  - status:deferred
  - priority:P3
body:
  - type: textarea
    id: why_later
    attributes:
      label: Why later
      description: Why is this not worth doing now?
    validations:
      required: true
  - type: textarea
    id: opening_signal
    attributes:
      label: Revisit when
      description: Name the concrete observation, demand, dependency, or consequence change that would justify another look.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Relevant scope
      description: Add only enough context to recognize the future decision.
