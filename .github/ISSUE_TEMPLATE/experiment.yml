name: Product experiment
description: Test a product, pricing, retention, or workflow hypothesis with explicit evidence.
title: "Experiment: "
labels:
  - type:experiment
body:
  - type: input
    id: baseline
    attributes:
      label: Current main SHA
      placeholder: main@<sha>
    validations:
      required: true
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis and target user
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source / audit
    validations:
      required: true
  - type: dropdown
    id: primary_plane
    attributes:
      label: Primary backlog plane
      description: This declaration does not apply a label; after creation, a reviewer must apply the matching plane:* label.
      options:
        - plane:truth — capital facts, imports, reconciliation, and verified projections
        - plane:knowledge — observations, claims, provenance, and evidence admission
        - plane:judgment — cases, scenarios, readiness, decisions, and validity
        - plane:control — identity, mandate, authorization, admission, and capability
        - plane:agent — bounded context, tools, observations, evaluation, and stop
        - plane:action-learning — execution, outcome review, lessons, and governed learning
        - plane:product — human discovery, decision, review, and learning journeys
        - plane:assurance — transactions, recovery, indexes, CI, proof, and engineering governance
    validations:
      required: true
  - type: dropdown
    id: lifecycle
    attributes:
      label: Backlog lifecycle
      description: This declaration does not apply a label; active still follows dependency order, while dormant and deferred do not authorize implementation.
      options:
        - status:active — authorized only in canonical dependency order
        - status:dormant — valid scope whose activation gate is not satisfied
        - status:deferred — explicit closed gate
        - status:temporary — limited owner with an exit condition
    validations:
      required: true

  - type: textarea
    id: blockers
    attributes:
      label: Native dependencies and product prerequisites
    validations:
      required: true
  - type: textarea
    id: protocol
    attributes:
      label: Experiment protocol and scope
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
    validations:
      required: true
  - type: textarea
    id: metrics
    attributes:
      label: Success, failure, and stop signals
      description: Prefer completed decisions, return/review behavior, and falsifiable outcomes over engagement counts.
    validations:
      required: true
  - type: textarea
    id: risk
    attributes:
      label: Privacy, safety, support, and rollback
    validations:
      required: true
  - type: textarea
    id: claims
    attributes:
      label: Documentation and product claims affected
    validations:
      required: true
  - type: dropdown
    id: executor
    attributes:
      label: Primary executor
      options:
        - Human
        - Codex
        - DeepSeek
        - Deterministic
    validations:
      required: true
