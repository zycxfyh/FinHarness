name: Product experiment
description: Test a product or workflow hypothesis and state what result changes the next decision.
title: "Experiment: "
labels:
  - type:experiment
body:
  - type: textarea
    id: hypothesis
    attributes:
      label: Hypothesis
      description: What do you expect, for whom, and why?
    validations:
      required: true
  - type: textarea
    id: test
    attributes:
      label: Test and decision rule
      description: What will be tried, observed, and used to continue, change, or stop?
    validations:
      required: true
  - type: textarea
    id: consequence
    attributes:
      label: Privacy or external consequence
      description: Note consent, personal data, spending, publishing, or rollback only when relevant.
