version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"

  # Rust crate archived 2026-06-13 (docs/archive/legacy-rust-crate); no cargo
  # manifest on the build path, so the cargo ecosystem entry was removed.
