version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      frontend-tooling:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      base-runtime:
        patterns:
          - "fastapi"
          - "keyring"
          - "opentelemetry-*"
          - "pandas"
          - "pydantic-settings"
          - "sqlmodel"
          - "structlog"
          - "uvicorn"
      data:
        patterns:
          - "beancount"
          - "beanquery"
          - "nautilus-trader"
          - "pandera"
          - "yfinance"
      research:
        patterns:
          - "backtrader"
          - "quantstats"
          - "riskfolio-lib"
          - "scipy"
          - "vectorbt"
      agent:
        patterns:
          - "langgraph"
          - "openai-agents"
          - "deepeval"
      dev-tooling:
        patterns:
          - "httpx"
          - "mypy"
          - "pytest"
          - "ruff"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      runtime:
        patterns:
          - "*"
