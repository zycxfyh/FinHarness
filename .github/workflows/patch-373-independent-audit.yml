name: patch-373-independent-audit

on:
  push:
    branches:
      - agent/373-capital-import-manifest

permissions:
  contents: write

jobs:
  install:
    if: ${{ !contains(github.event.head_commit.message, 'record bundle diagnostic') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Detect complete bundle
        id: bundle
        shell: bash
        run: |
          if [ -f .ci/issue373-bundle/READY ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up uv
        if: steps.bundle.outputs.ready == 'true'
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.10.9"

      - name: Install, verify, and publish exact repair bundle
        if: steps.bundle.outputs.ready == 'true'
        shell: bash
        run: |
          set +e
          LOG=/tmp/issue373-bundle.log
          : > "$LOG"
          {
            set -euo pipefail
            uv sync --frozen
            python - <<'PY'
          from __future__ import annotations

          import base64
          import zlib
          from pathlib import Path

          mapping = {
              "docs/governance/capital-import-entrypoints.json": "projection.zlib.b64",
              "scripts/check_capital_import_entrypoints.py": "checker.zlib.b64",
              "src/finharness/capital_import_registry.py": "registry.zlib.b64",
              "src/finharness/capital_import_recovery.py": "recovery.zlib.b64",
              "src/finharness/personal_finance.py": "personal-finance.zlib.b64",
              "src/finharness/beancount_adapter.py": "beancount.zlib.b64",
              "src/finharness/statecore/__init__.py": "statecore-init.zlib.b64",
              "src/finharness/statecore/store.py": "store.zlib.b64",
              "tests/test_capital_import_entrypoints.py": "tests.zlib.b64",
          }
          bundle = Path(".ci/issue373-bundle")
          for destination, token_file in mapping.items():
              target = Path(destination)
              target.parent.mkdir(parents=True, exist_ok=True)
              encoded = (bundle / token_file).read_text(encoding="ascii").strip()
              target.write_bytes(zlib.decompress(base64.b64decode(encoded)))
          PY
            git checkout origin/main -- scripts/run_timed_check.py
            rm -f \
              scripts/_patch_373_core.py \
              scripts/_patch_373_checker.py \
              scripts/_patch_373_tests.py \
              scripts/_patch_373_checker_lint.py \
              scripts/_patch_373_recovery_lint.py \
              scripts/sitecustomize.py \
              patch-373-status.txt
            rm -rf .ci/issue373-bundle
            rm .github/workflows/patch-373-independent-audit.yml
            files=(
              scripts/check_capital_import_entrypoints.py
              src/finharness/capital_import_registry.py
              src/finharness/capital_import_recovery.py
              src/finharness/personal_finance.py
              src/finharness/beancount_adapter.py
              src/finharness/statecore/__init__.py
              src/finharness/statecore/store.py
              tests/test_capital_import_entrypoints.py
            )
            uv run ruff format "${files[@]}"
            uv run ruff check --fix "${files[@]}"
            uv run ruff check "${files[@]}"
            python -m json.tool docs/governance/capital-import-entrypoints.json >/dev/null
            PYTHONPATH=src uv run python scripts/check_capital_import_entrypoints.py
            PYTHONPATH=src uv run python -m unittest \
              tests.test_capital_import_entrypoints \
              tests.test_statecore_snapshot_ingest \
              tests.test_capital_import_recovery \
              tests.test_daily_change_brief
            git diff --check
          } >> "$LOG" 2>&1
          STATUS=$?

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$STATUS" -ne 0 ]; then
            git reset --hard HEAD
            printf 'failure\n\n' > patch-373-status.txt
            tail -c 50000 "$LOG" >> patch-373-status.txt
            git add patch-373-status.txt
            git commit -m "ci(373): record bundle diagnostic"
            git push origin HEAD:agent/373-capital-import-manifest
            exit 1
          fi

          git add -A
          git diff --cached --check
          git commit -m "ASSURE-CAP-01: close independent audit blockers"
          git push origin HEAD:agent/373-capital-import-manifest
