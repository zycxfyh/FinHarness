name: documentation-inventory

on:
  pull_request:
    paths:
      - ".github/workflows/documentation-inventory.yml"
      - "scripts/audit_documentation_inventory.py"
      - "docs/reviews/documentation/**"
      - "Taskfile.yml"
  workflow_dispatch:
    inputs:
      baseline_sha:
        description: Exact Git commit to inventory
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  inventory:
    name: Exact-SHA documentation inventory
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify documentation inventory checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: pr_head
          expected_sha: ${{ github.event.pull_request.head.sha }}
          command: build exact-SHA documentation inventory

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Run adversarial inventory self-test
        run: env -u UV_LOCKED uv run --script scripts/audit_documentation_inventory.py --self-test

      - name: Build exact-baseline inventory
        env:
          BASELINE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || inputs.baseline_sha || github.sha }}
        run: |
          env -u UV_LOCKED uv run --script scripts/audit_documentation_inventory.py \
            --baseline "$BASELINE_SHA" \
            --output-dir .artifacts/documentation-inventory
          mapfile -d '' MARKDOWN_PATHS < <(
            git ls-tree -r --name-only -z "$BASELINE_SHA" | \
              while IFS= read -r -d '' path; do
                case "$path" in
                  *.md|*.markdown) printf '%s\0' "$path" ;;
                esac
              done
          )
          git archive \
            --format=tar.gz \
            --output=.artifacts/documentation-inventory/documentation-source-bundle.tar.gz \
            "$BASELINE_SHA" \
            -- "${MARKDOWN_PATHS[@]}"

      - name: Upload documentation inventory evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: documentation-inventory
          path: .artifacts/documentation-inventory
          if-no-files-found: error
          retention-days: 20
