name: browser-golden-paths

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    name: Browser change scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.classify.outputs.ready }}
      relevant: ${{ steps.classify.outputs.relevant }}
    steps:
      - id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "ready=true"
              echo "relevant=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            gh api --paginate \
              "repos/$REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename'
          )"
          relevant=false
          while IFS= read -r path; do
            case "$path" in
              frontend/*|src/finharness/api/*|scripts/*cockpit*|\
              scripts/run_browser_*|scripts/run_local_review_smoke_server.py|\
              tests/*browser*|Taskfile.yml|package.json|pnpm-lock.yaml|\
              .github/workflows/browser.yml)
                relevant=true
                ;;
            esac
          done <<< "$changed_files"

          ready=true
          [[ "$PR_DRAFT" == "true" ]] && ready=false
          {
            echo "ready=$ready"
            echo "relevant=$relevant"
          } >> "$GITHUB_OUTPUT"

  browser-smoke:
    name: Cockpit browser golden paths (optional)
    needs: scope
    if: >-
      github.event_name != 'pull_request' ||
      (needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}

      - name: Verify browser checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: task test:browser

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Install Python dependencies
        run: uv sync --locked --no-default-groups

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium + system libraries
        run: pnpm exec playwright install --with-deps chromium

      - name: Run cockpit browser golden-path smoke
        env:
          FINHARNESS_PYTHON: .venv/bin/python
        run: task test:browser

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cockpit-browser-smoke-artifacts
          path: frontend/tests/browser/artifacts/
          if-no-files-found: ignore
          retention-days: 7
