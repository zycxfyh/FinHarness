name: browser-golden-paths

# D8 real-browser cockpit smoke (Playwright + Chromium). This is an OPTIONAL job: it is
# intentionally NOT part of `task check` and is not a required merge gate (see
# docs/proposals/2026-06-23-d8-browser-golden-paths.md). "Optional" means non-blocking for
# merge — it does NOT mean failures are ignored: the job still goes red on failure and that
# red is a tracked finding, not a silent skip.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  browser-smoke:
    name: Cockpit browser golden paths (optional)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify browser checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: task test:browser

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Install Python dependencies
        run: uv sync --locked --no-default-groups

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium + system libraries
        run: pnpm exec playwright install --with-deps chromium

      - name: Run cockpit browser golden-path smoke
        env:
          FINHARNESS_PYTHON: .venv/bin/python
        run: task test:browser

      - name: Upload browser smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cockpit-browser-smoke-artifacts
          path: frontend/tests/browser/artifacts/
          if-no-files-found: ignore
          retention-days: 7
