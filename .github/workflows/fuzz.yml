name: fuzz

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "17 8 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    name: Fuzz change scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.classify.outputs.ready }}
      relevant: ${{ steps.classify.outputs.relevant }}
    steps:
      - id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "ready=true"
              echo "relevant=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            gh api --paginate \
              "repos/$REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename'
          )"
          relevant=false
          while IFS= read -r path; do
            case "$path" in
              src/*.py|src/*/*.py|src/*/*/*.py|scripts/*.py|tests/*.py|\
              data/security/fuzzing/*|pyproject.toml|uv.lock|Taskfile.yml|\
              .github/workflows/fuzz.yml)
                relevant=true
                ;;
            esac
          done <<< "$changed_files"

          ready=true
          [[ "$PR_DRAFT" == "true" ]] && ready=false
          {
            echo "ready=$ready"
            echo "relevant=$relevant"
          } >> "$GITHUB_OUTPUT"

  deterministic-fuzz-baseline:
    name: Deterministic fuzz baseline
    needs: scope
    if: >-
      github.event_name != 'pull_request' ||
      (needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify fuzz checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: task security:fuzz

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Run deterministic fuzz baseline
        run: task security:fuzz
