name: fuzz

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "17 8 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  deterministic-fuzz-baseline:
    name: Deterministic fuzz baseline
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify fuzz merge-ref identity
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim merge_ref
          --expected-sha "${{ github.sha }}"
          --command "verify fuzz merge-ref identity"

      - name: Upload fuzz merge-ref identity
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-merge-ref-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Run deterministic fuzz baseline
        run: task security:fuzz
