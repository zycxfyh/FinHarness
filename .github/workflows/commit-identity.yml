name: commit-identity

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pr-head-identity:
    name: PR head commit identity
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Verify PR head identity
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim pr_head
          --expected-sha "${{ github.event.pull_request.head.sha }}"
          --command "verify PR head commit identity"

      - name: Upload PR head identity evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pr-head-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20

  merge-ref-identity:
    name: Pull request merge-ref identity
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify synthetic merge-ref identity
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim merge_ref
          --expected-sha "${{ github.sha }}"
          --command "verify pull request merge-ref commit identity"

      - name: Upload merge-ref identity evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: merge-ref-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20

  main-commit-identity:
    name: Final main commit identity
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify final main commit identity
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim main_commit
          --expected-sha "${{ github.sha }}"
          --command "verify final main commit identity"

      - name: Upload final main identity evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: final-main-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20
