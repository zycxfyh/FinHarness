name: security

on:
  pull_request:

permissions:
  contents: write

jobs:
  local-checks:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.10.9"

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa

      - name: Apply and verify final #373 repairs
        id: repair
        continue-on-error: true
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts
          LOG=.artifacts/issue373-final-repair.log
          : > "$LOG"
          {
            set -euxo pipefail
            python scripts/_patch_373_final.py
            uv sync --frozen
            files=(
              scripts/check_capital_import_entrypoints.py
              src/finharness/capital_import_registry.py
              src/finharness/capital_import_recovery.py
              src/finharness/personal_finance.py
              src/finharness/beancount_adapter.py
              src/finharness/statecore/__init__.py
              src/finharness/statecore/store.py
              tests/test_capital_import_entrypoints.py
            )
            uv run ruff format "${files[@]}"
            uv run ruff check --fix "${files[@]}"
            uv run ruff check "${files[@]}"
            git fetch origin main --depth=1
            git checkout origin/main -- \
              .github/workflows/security.yml \
              scripts/run_timed_check.py
            rm -rf .ci/issue373-bundle
            rm -f \
              .github/workflows/patch-373-independent-audit.yml \
              scripts/_diagnose_373_snapshot.py \
              scripts/_patch_373_core.py \
              scripts/_patch_373_checker.py \
              scripts/_patch_373_tests.py \
              scripts/_patch_373_checker_lint.py \
              scripts/_patch_373_recovery_lint.py \
              scripts/_patch_373_final.py \
              scripts/sitecustomize.py \
              patch-373-status.txt
            python -m json.tool docs/governance/capital-import-entrypoints.json >/dev/null
            git diff --check
            task check:timed
            task redteam:tools-check
            task redteam:dryrun-config-check
            task eval:redteam-boundary
          } >> "$LOG" 2>&1
          STATUS=$?
          printf '\nexit_status=%s\n' "$STATUS" >> "$LOG"
          exit "$STATUS"

      - name: Upload final repair evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue373-final-repair
          path: |
            .artifacts/issue373-final-repair.log
            .artifacts/check-timing.json
          if-no-files-found: warn
          retention-days: 10

      - name: Fail when final repair verification failed
        if: steps.repair.outcome == 'failure'
        run: exit 1

      - name: Publish verified final #373 repair
        if: steps.repair.outcome == 'success'
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ASSURE-CAP-01: close independent audit blockers"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
