name: security

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify dependency-review checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: dependency review and PR contract

      - name: Validate pull request contract
        run: python scripts/manage_pr_contract.py check --event "$GITHUB_EVENT_PATH"

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  local-checks:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Verify Local verification checkout identity
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: ${{ github.event_name == 'pull_request' && 'pr_head' || 'main_commit' }}
          expected_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          command: task check:timed

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Apply exact #373 independent-audit repairs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/373-capital-import-manifest'
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          target = Path("scripts/_patch_373_core.py")
          text = target.read_text(encoding="utf-8")
          start = text.index(
              'replace_once(\n    "src/finharness/capital_import_registry.py"'
          )
          end = text.index(
              'replace_once(\n    "src/finharness/statecore/store.py"',
              start,
          )
          target.write_text(text[:start] + text[end:], encoding="utf-8")
          PY
          python scripts/_patch_373_core.py
          python scripts/_patch_373_recovery_lint.py
          uv sync --frozen
          files=(
            scripts/check_capital_import_entrypoints.py
            src/finharness/capital_import_registry.py
            src/finharness/capital_import_recovery.py
            src/finharness/personal_finance.py
            src/finharness/beancount_adapter.py
            src/finharness/statecore/__init__.py
            src/finharness/statecore/store.py
            tests/test_capital_import_entrypoints.py
          )
          uv run ruff format "${files[@]}"
          uv run ruff check --fix "${files[@]}"
          git fetch origin main --depth=1
          git checkout origin/main -- \
            .github/workflows/security.yml \
            scripts/run_timed_check.py
          rm -rf .ci/issue373-bundle
          rm -f \
            .github/workflows/patch-373-independent-audit.yml \
            scripts/_patch_373_core.py \
            scripts/_patch_373_checker.py \
            scripts/_patch_373_tests.py \
            scripts/_patch_373_checker_lint.py \
            scripts/_patch_373_recovery_lint.py \
            scripts/sitecustomize.py \
            patch-373-status.txt
          python -m json.tool docs/governance/capital-import-entrypoints.json >/dev/null
          git diff --check

      - name: Run standard project checks
        run: task check:timed

      - name: Upload check timing evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: check-timing
          path: .artifacts/check-timing.json
          if-no-files-found: error
          retention-days: 20

      - name: Record red-team tool readiness
        run: task redteam:tools-check

      - name: Validate promptfoo redteam dry-run contract
        run: task redteam:dryrun-config-check

      - name: Run promptfoo red-team boundary corpus smoke eval
        run: task eval:redteam-boundary

      - name: Publish verified #373 repairs
        if: github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'agent/373-capital-import-manifest'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "ASSURE-CAP-01: close independent audit blockers"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify CodeQL checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: CodeQL analysis

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Verify Gitleaks checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: gitleaks detect

      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          mkdir -p "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/${archive}" "${base_url}/${archive}"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/checksums.txt" "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          (
            cd "$RUNNER_TEMP/gitleaks"
            grep " ${archive}$" checksums.txt | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/gitleaks/${archive}" -C "$RUNNER_TEMP/gitleaks" gitleaks
          install -m 0755 "$RUNNER_TEMP/gitleaks/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify Trivy checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: Trivy filesystem scan

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          skip-dirs: .venv,vendor
          severity: HIGH,CRITICAL
          exit-code: "1"
