name: security

on:
  pull_request:

permissions:
  contents: read

jobs:
  local-checks:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.10.9"

      - name: Capture Snapshot binding diagnostic
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts
          python scripts/_diagnose_373_snapshot.py \
            > .artifacts/issue373-snapshot-binding.log 2>&1
          printf '\nexit_status=%s\n' "$?" \
            >> .artifacts/issue373-snapshot-binding.log
          exit 0

      - name: Upload Snapshot binding diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue373-snapshot-binding
          path: .artifacts/issue373-snapshot-binding.log
          if-no-files-found: error
          retention-days: 3
