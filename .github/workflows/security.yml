name: security

on:
  pull_request:

permissions:
  contents: read

jobs:
  local-checks:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.10.9"

      - name: Capture exact repair diagnostic
        shell: bash
        run: |
          set +e
          mkdir -p .artifacts
          LOG=.artifacts/issue373-repair.log
          : > "$LOG"
          {
            set -x
            python - <<'PY'
          from pathlib import Path

          target = Path("scripts/_patch_373_core.py")
          text = target.read_text(encoding="utf-8")
          start = text.index(
              'replace_once(\n    "src/finharness/capital_import_registry.py"'
          )
          end = text.index(
              'replace_once(\n    "src/finharness/statecore/store.py"',
              start,
          )
          target.write_text(text[:start] + text[end:], encoding="utf-8")
          PY
            python scripts/_patch_373_core.py
            python scripts/_patch_373_recovery_lint.py
            uv sync --frozen
            files=(
              scripts/check_capital_import_entrypoints.py
              src/finharness/capital_import_registry.py
              src/finharness/capital_import_recovery.py
              src/finharness/personal_finance.py
              src/finharness/beancount_adapter.py
              src/finharness/statecore/__init__.py
              src/finharness/statecore/store.py
              tests/test_capital_import_entrypoints.py
            )
            uv run ruff format "${files[@]}"
            uv run ruff check --fix "${files[@]}"
            uv run ruff check "${files[@]}"
            PYTHONPATH=src uv run python scripts/check_capital_import_entrypoints.py
            PYTHONPATH=src uv run python -m unittest \
              tests.test_capital_import_entrypoints \
              tests.test_statecore_snapshot_ingest \
              tests.test_capital_import_recovery \
              tests.test_daily_change_brief
          } >> "$LOG" 2>&1
          STATUS=$?
          printf '\nexit_status=%s\n' "$STATUS" >> "$LOG"
          exit 0

      - name: Upload exact repair diagnostic
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: issue373-repair-diagnostic
          path: .artifacts/issue373-repair.log
          if-no-files-found: error
          retention-days: 3
