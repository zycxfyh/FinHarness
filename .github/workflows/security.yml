name: security

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "29 7 * * 3"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    name: Change scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.classify.outputs.ready }}
      docs_only: ${{ steps.classify.outputs.docs_only }}
      python: ${{ steps.classify.outputs.python }}
      dependencies: ${{ steps.classify.outputs.dependencies }}
      security_surface: ${{ steps.classify.outputs.security_surface }}
      agent: ${{ steps.classify.outputs.agent }}
      gitleaks_depth: ${{ steps.classify.outputs.gitleaks_depth }}
    steps:
      - id: classify
        name: Classify changed paths
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "ready=true"
              echo "docs_only=false"
              echo "python=true"
              echo "dependencies=true"
              echo "security_surface=true"
              echo "agent=true"
              echo "gitleaks_depth=1"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t files < <(
            gh api --paginate \
              "repos/$REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename'
          )
          pr_commits="$(
            gh api "repos/$REPOSITORY/pulls/$PR_NUMBER" --jq '.commits'
          )"
          gitleaks_depth=$((pr_commits + 1))

          docs_only=true
          python=false
          dependencies=false
          security_surface=false
          agent=false

          if [[ ${#files[@]} -eq 0 ]]; then
            docs_only=false
          fi

          for path in "${files[@]}"; do
            case "$path" in
              *.md|*.markdown|docs/*)
                ;;
              *)
                docs_only=false
                ;;
            esac

            case "$path" in
              *.py|pyproject.toml|uv.lock)
                python=true
                ;;
            esac

            case "$path" in
              pyproject.toml|uv.lock|package.json|pnpm-lock.yaml|Taskfile.yml|\
              .github/workflows/dependency-profiles.yml)
                dependencies=true
                ;;
            esac

            case "$path" in
              .github/*|Dockerfile|Dockerfile.*|docker-compose*|compose*.yml|\
              compose*.yaml|pyproject.toml|uv.lock|package.json|pnpm-lock.yaml|\
              .gitleaks.toml|docs/security/*|scripts/run_hardening_gate.py)
                security_surface=true
                ;;
            esac

            case "$path" in
              src/finharness/agent*|src/finharness/*agent*|prompts/*|evals/*|\
              scripts/*redteam*|tests/*agent*)
                agent=true
                ;;
            esac
          done

          ready=true
          if [[ "$PR_DRAFT" == "true" ]]; then
            ready=false
          fi

          {
            echo "ready=$ready"
            echo "docs_only=$docs_only"
            echo "python=$python"
            echo "dependencies=$dependencies"
            echo "security_surface=$security_surface"
            echo "agent=$agent"
            echo "gitleaks_depth=$gitleaks_depth"
          } >> "$GITHUB_OUTPUT"

  fast-feedback:
    name: Fast feedback
    needs: scope
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verify fast-feedback checkout identity
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: ${{ github.event_name == 'pull_request' && 'pr_head' || 'main_commit' }}
          expected_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          command: fast scope-aware feedback

      - name: Validate pull request contract
        if: github.event_name == 'pull_request'
        env:
          IS_READY: ${{ needs.scope.outputs.ready }}
        shell: bash
        run: |
          set +e
          python scripts/manage_pr_contract.py check --event "$GITHUB_EVENT_PATH"
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          if [[ "$IS_READY" != "true" ]]; then
            echo "::warning::Draft PR contract is incomplete; it becomes required when Ready."
            exit 0
          fi
          exit "$status"

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        if: needs.scope.outputs.docs_only == 'true' || (needs.scope.outputs.ready != 'true' && needs.scope.outputs.python == 'true')

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        if: needs.scope.outputs.docs_only == 'true'

      - name: Install base documentation dependencies
        if: needs.scope.outputs.docs_only == 'true'
        run: uv sync --locked --no-default-groups

      - name: Check maintained documentation
        if: needs.scope.outputs.docs_only == 'true'
        run: task docs:current-check

      - name: Lint changed Python files in Draft
        if: github.event_name == 'pull_request' && needs.scope.outputs.ready != 'true' && needs.scope.outputs.python == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t python_files < <(
            gh api --paginate \
              "repos/$REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename' |
              grep -E '\.py$' || true
          )
          existing=()
          for path in "${python_files[@]}"; do
            [[ -f "$path" ]] && existing+=("$path")
          done
          if [[ ${#existing[@]} -gt 0 ]]; then
            uvx --from ruff==0.15.14 ruff check "${existing[@]}"
          fi

  dependency-review:
    name: Dependency review
    needs: scope
    if: github.event_name == 'pull_request' && needs.scope.outputs.ready == 'true' && needs.scope.outputs.dependencies == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify dependency-review checkout identity
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: dependency review

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  local-checks:
    name: Local verification
    needs: scope
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.docs_only != 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verify Local verification checkout identity
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: ${{ github.event_name == 'pull_request' && 'pr_head' || 'main_commit' }}
          expected_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          command: task check:timed

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Run standard project checks
        run: task check:timed

      - name: Upload check evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: check-evidence
          path: |
            .artifacts/check-timing.json
            .artifacts/check-logs/
          if-no-files-found: error
          retention-days: 20

      - name: Record red-team tool readiness
        if: needs.scope.outputs.agent == 'true'
        run: task redteam:tools-check

      - name: Validate promptfoo redteam dry-run contract
        if: needs.scope.outputs.agent == 'true'
        run: task redteam:dryrun-config-check

      - name: Run promptfoo red-team boundary corpus smoke eval
        if: needs.scope.outputs.agent == 'true'
        run: task eval:redteam-boundary

  codeql:
    name: CodeQL
    needs: scope
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.python == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify CodeQL checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: CodeQL analysis

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  gitleaks:
    name: Gitleaks
    needs: scope
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: ${{ github.event_name == 'schedule' && '0' || needs.scope.outputs.gitleaks_depth }}

      - name: Verify Gitleaks checkout identity
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: ${{ github.event_name == 'pull_request' && 'pr_head' || 'main_commit' }}
          expected_sha: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          command: gitleaks PR commit-range scan

      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        shell: bash
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          mkdir -p "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/${archive}" "${base_url}/${archive}"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/checksums.txt" \
            "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          (
            cd "$RUNNER_TEMP/gitleaks"
            grep " ${archive}$" checksums.txt | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/gitleaks/${archive}" \
            -C "$RUNNER_TEMP/gitleaks" gitleaks
          install -m 0755 "$RUNNER_TEMP/gitleaks/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Scan pull request commit range
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_SHA"
          gitleaks git \
            --log-opts="${BASE_SHA}..${HEAD_SHA}" \
            --config "$GITHUB_WORKSPACE/.gitleaks.toml" \
            --redact \
            --verbose \
            .

      - name: Scan current main tree
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: gitleaks dir --config .gitleaks.toml --redact --verbose .

      - name: Scan full history on schedule
        if: github.event_name == 'schedule'
        run: gitleaks git --config .gitleaks.toml --redact --verbose .

  trivy:
    name: Trivy filesystem scan
    needs: scope
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.security_surface == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify Trivy checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: Trivy filesystem scan

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          skip-dirs: .venv,vendor
          severity: HIGH,CRITICAL
          exit-code: "1"
