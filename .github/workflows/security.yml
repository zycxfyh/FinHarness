name: security

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate pull request contract
        run: python scripts/manage_pr_contract.py check --event "$GITHUB_EVENT_PATH"

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  local-checks:
    name: Local verification
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Verify local-check commit identity
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          IDENTITY_CLAIM: ${{ github.event_name == 'pull_request' && 'pr_head' || 'main_commit' }}
          EXPECTED_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim "$IDENTITY_CLAIM"
          --expected-sha "$EXPECTED_SHA"
          --command "verify local-check commit identity before task check:timed"

      - name: Upload local-check commit identity
        if: always() && (github.event_name == 'pull_request' || github.event_name == 'push')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: local-check-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "pnpm"

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Run standard project checks
        run: task check:timed

      - name: Upload check timing evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: check-timing
          path: .artifacts/check-timing.json
          if-no-files-found: error
          retention-days: 20

      - name: Record red-team tool readiness
        run: task redteam:tools-check

      - name: Validate promptfoo redteam dry-run contract
        run: task redteam:dryrun-config-check

      - name: Run promptfoo red-team boundary corpus smoke eval
        run: task eval:redteam-boundary

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python

      - uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so the CLI scan covers the repository history instead of
          # only a partial PR range.
          fetch-depth: 0

      - name: Install gitleaks CLI
        env:
          GITLEAKS_VERSION: "8.28.0"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          base_url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          mkdir -p "$RUNNER_TEMP/gitleaks" "$RUNNER_TEMP/bin"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/${archive}" "${base_url}/${archive}"
          curl -sSfL -o "$RUNNER_TEMP/gitleaks/checksums.txt" "${base_url}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          (
            cd "$RUNNER_TEMP/gitleaks"
            grep " ${archive}$" checksums.txt | sha256sum -c -
          )
          tar -xzf "$RUNNER_TEMP/gitleaks/${archive}" -C "$RUNNER_TEMP/gitleaks" gitleaks
          install -m 0755 "$RUNNER_TEMP/gitleaks/gitleaks" "$RUNNER_TEMP/bin/gitleaks"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose

  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig
          skip-dirs: .venv,vendor
          severity: HIGH,CRITICAL
          exit-code: "1"
