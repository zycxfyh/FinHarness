name: dependency-profiles

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  isolated-profile:
    name: Isolated ${{ matrix.profile }} profile
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # Base isolation is owned once by Local verification / check:ci.
        profile: [data, research, agent, eval]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.sha }}

      - name: Verify dependency-profile merge-ref identity
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/verify_ci_commit_identity.py
          --claim merge_ref
          --expected-sha "${{ github.sha }}"
          --command "verify dependency-profile-${{ matrix.profile }} merge-ref identity"

      - name: Upload dependency-profile merge-ref identity
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-profile-${{ matrix.profile }}-merge-ref-commit-identity
          path: .artifacts/ci-commit-identity.json
          if-no-files-found: error
          retention-days: 20

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Probe isolated dependency profile
        run: task deps:probe-${{ matrix.profile }}
