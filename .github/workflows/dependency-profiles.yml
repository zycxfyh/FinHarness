name: dependency-profiles

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scope:
    name: Dependency change scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.classify.outputs.ready }}
      relevant: ${{ steps.classify.outputs.relevant }}
    steps:
      - id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            {
              echo "ready=true"
              echo "relevant=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(
            gh api --paginate \
              "repos/$REPOSITORY/pulls/$PR_NUMBER/files?per_page=100" \
              --jq '.[].filename'
          )"
          relevant=false
          while IFS= read -r path; do
            case "$path" in
              *.py|pyproject.toml|uv.lock|Cargo.toml|Cargo.lock|\
              crates/*/Cargo.toml|Taskfile.yml|.github/workflows/dependency-profiles.yml)
                relevant=true
                ;;
            esac
          done <<< "$changed_files"

          ready=true
          [[ "$PR_DRAFT" == "true" ]] && ready=false
          {
            echo "ready=$ready"
            echo "relevant=$relevant"
          } >> "$GITHUB_OUTPUT"

  isolated-profile:
    name: Isolated ${{ matrix.profile }} profile
    needs: scope
    if: >-
      github.event_name != 'pull_request' ||
      (needs.scope.outputs.ready == 'true' &&
       needs.scope.outputs.relevant == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        profile: [data, research, agent, eval]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.sha }}

      - name: Verify dependency-profile checkout identity
        if: github.event_name == 'pull_request'
        uses: ./.github/actions/verify-commit-identity
        with:
          claim: merge_ref
          expected_sha: ${{ github.sha }}
          command: task deps:probe-${{ matrix.profile }}

      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      - uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Probe isolated dependency profile
        run: task deps:probe-${{ matrix.profile }}
