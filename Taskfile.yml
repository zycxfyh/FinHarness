version: '3'

env:
  PYTHONPATH: src
  PROMPTFOO_DISABLE_TELEMETRY: '1'
  PROMPTFOO_DISABLE_UPDATE: '1'

tasks:
  status:
    desc: Show lab status
    cmds:
      - git status --short
      - uv run python --version
      - pnpm --version
      - find vendor -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort

  ideas:list:
    desc: Show Idea Lab backlog
    cmds:
      - cat ideas/backlog.md

  ideas:evolve:
    desc: Run Forward Evolution — cross two ideas from the pool
    cmds:
      - 'echo "TODO: automated evolve — for now, manually review the pool and create a new EXP"'

  setup:
    desc: Sync locked Python and JS dependencies
    cmds:
      - uv sync --locked
      - pnpm install --frozen-lockfile

  check:
    desc: Run the standard local verification suite
    cmds:
      - task: lint
      - task: typecheck
      - task: test
      - task: test:properties
      - task: rules:audit
      - task: experiments
      - task: eval:smoke

  hardening:gate:
    desc: Run local MVP hardening checks without printing secret material
    cmds:
      - uv run python scripts/run_hardening_gate.py

  repo:intelligence:
    desc: Build local repo intelligence graph, Mermaid doc, and receipt
    cmds:
      - uv run python scripts/run_repo_intelligence_graph.py

  receipt:usage-audit:
    desc: Audit which receipts are consumed by reviews, lessons, and docs
    cmds:
      - uv run python scripts/run_receipt_usage_audit.py --write

  quality:governance:
    desc: Run quality governance graph with authoritative local checks
    cmds:
      - uv run python scripts/run_quality_governance_graph.py --run-checks

  quality:governance-checks:
    desc: Alias for quality governance with authoritative local checks
    cmds:
      - uv run python scripts/run_quality_governance_graph.py --run-checks

  release:preflight:
    desc: Run release preflight graph with authoritative local checks
    cmds:
      - uv run python scripts/run_release_preflight_graph.py --run-checks

  governance:dashboard:
    desc: Build the RC governance dashboard receipt and Markdown report
    cmds:
      - uv run python scripts/run_governance_dashboard.py

  governance:certify-controls:
    desc: "NOW-3: certify control-owner baseline with a named human owner"
    cmds:
      - uv run python scripts/run_control_certification.py {{.CLI_ARGS}}

  project:governance-adapter:
    desc: Adapt workstation Project Governance Loop receipt into FinHarness compatibility receipt
    cmds:
      - uv run python scripts/run_project_governance_adapter.py

  test:properties:
    desc: Run property-style governance and boundary tests
    cmds:
      - uv run python -m unittest tests/test_property_baseline.py

  hardening:redteam:
    desc: Run local adversarial boundary checks
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks redteam

  redteam:tools-check:
    desc: Record local red-team tool readiness
    cmds:
      - uv run python scripts/check_redteam_tool_readiness.py

  redteam:dryrun-config-check:
    desc: Validate promptfoo redteam dry-run contract
    cmds:
      - uv run python scripts/validate_promptfoo_redteam_dryrun.py

  security:scan:
    desc: Run local dependency, gitleaks, and Trivy security scans
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks dependency gitleaks trivy

  security:audit:
    desc: Audit installed dependencies for known advisories (pip-audit; needs network, fail-closed)
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks pip-audit

  security:sbom:
    desc: Generate local SBOM and provenance baseline artifacts
    cmds:
      - uv run python scripts/generate_security_sbom.py

  security:fuzz:
    desc: Run deterministic governance-boundary fuzz baseline
    cmds:
      - uv run python scripts/run_fuzz_baseline.py

  lint:
    desc: Run Python lint checks
    cmds:
      - uv run ruff check .

  typecheck:
    desc: Static type check (mypy; strict on safety-critical core)
    cmds:
      - uv run mypy

  format:
    desc: Format Python code
    cmds:
      - uv run ruff format .

  test:
    desc: Run Python compile and unit tests
    cmds:
      - uv run python -m py_compile src/finharness/*.py experiments/*.py tests/*.py scripts/*.py
      - uv run python -m unittest discover -s tests

  api:serve:
    desc: Serve the read-only local state API
    cmds:
      - uv run uvicorn finharness.api.app:app --host 127.0.0.1 --port 8765

  personal-finance:import:
    desc: Import a read-only FinHarness-contract personal-finance CSV into state core
    cmds:
      - uv run python scripts/import_personal_finance_export.py {{.CLI_ARGS}}

  beancount:import:
    desc: Mirror a real Beancount ledger (via bean-query) into state core, read-only
    cmds:
      - uv run python scripts/import_beancount_ledger.py {{.CLI_ARGS}}

  db:migrate:
    desc: Apply state-core schema migrations (PRAGMA user_version) to the database
    cmds:
      - uv run python scripts/migrate_state_core.py {{.CLI_ARGS}}

  brief:daily:
    desc: Compute and archive the unified daily brief as a dated receipt
    cmds:
      - uv run python scripts/record_daily_brief.py {{.CLI_ARGS}}

  decisions:scan:
    desc: Scan the exposure map and record capital-allocation candidates as governed proposals (read-only)
    cmds:
      - uv run python scripts/record_decisions.py {{.CLI_ARGS}}

  backup:
    desc: Back up state-core SQLite and receipts without relying on git
    cmds:
      - uv run python scripts/backup.py {{.CLI_ARGS}}

  cockpit:daily:
    desc: Build a governed deterministic daily portfolio-change brief
    cmds:
      - uv run python scripts/run_daily_change_brief.py {{.CLI_ARGS}}

  experiments:
    desc: Run mature-wheel local backtest experiments
    cmds:
      - uv run python experiments/backtrader_ma.py
      - uv run python experiments/vectorbt_ma.py
      - uv run python experiments/riskfolio_allocation.py

  wheels:size:
    desc: Show local wheel sizes
    cmds:
      - du -sh vendor/* 2>/dev/null | sort -h

  docs:list:
    desc: List project docs
    cmds:
      - find docs -type f | sort

  vocab:lint:
    desc: Advisory controlled-vocabulary lint for formal docs and code strings
    cmds:
      - uv run python scripts/vocab_lint.py {{.CLI_ARGS}}

  smoke:
    desc: Run a minimal Python smoke test
    cmds:
      - task: test
      - task: experiments

  wheels:check:
    desc: Check installed top wheels
    cmds:
      - uv run python scripts/check_python_wheels.py
      - pnpm exec promptfoo --version

  wheels:data-check:
    desc: Check installed wheels plus provider-backed network data
    cmds:
      - uv run python scripts/check_python_wheels.py --network
      - pnpm exec promptfoo --version

  agent:describe:
    desc: Describe registered OpenAI Agents SDK tools
    cmds:
      - uv run python scripts/describe_agent_tools.py

  agent:run:
    desc: Run the real agent when OPENAI_API_KEY is configured
    cmds:
      - uv run python scripts/run_agent_once.py

  eval:smoke:
    desc: Run promptfoo local echo eval
    cmds:
      - pnpm exec promptfoo eval -c evals/promptfoo/echo.yaml --no-cache

  eval:redteam-boundary:
    desc: Export and run local promptfoo red-team boundary corpus smoke eval
    cmds:
      - uv run python scripts/export_redteam_artifacts.py
      - pnpm exec promptfoo eval -c evals/promptfoo/redteam-boundary.yaml --no-cache

  data:entry:
    desc: Run OpenBB quote + yfinance history + Backtrader workflow
    cmds:
      - uv run python scripts/run_data_entry_workflow.py {{.CLI_ARGS}}

  cockpit:market:
    desc: Build the read-only market cockpit for a watchlist
    cmds:
      - uv run python scripts/run_market_cockpit.py {{.CLI_ARGS}}

  market-data:graph:
    desc: Run first-layer market data LangGraph workflow
    cmds:
      - uv run python scripts/run_market_data_graph.py {{.CLI_ARGS}}

  indicators:graph:
    desc: Run second-layer indicator LangGraph workflow
    cmds:
      - uv run python scripts/run_indicator_graph.py {{.CLI_ARGS}}

  feature:macd:
    desc: Run MACD feature snapshot
    cmds:
      - uv run python scripts/run_macd_snapshot.py {{.CLI_ARGS}}

  feature:squeeze:
    desc: Run Squeeze Momentum feature snapshot
    cmds:
      - uv run python scripts/run_squeeze_snapshot.py {{.CLI_ARGS}}

  feature:smc:
    desc: Run SMC/MSB-OB feature snapshot
    cmds:
      - uv run python scripts/run_smc_snapshot.py {{.CLI_ARGS}}

  feature:snapshot:
    desc: Run combined MACD, Squeeze, and SMC feature snapshot
    cmds:
      - uv run python scripts/run_indicator_snapshot.py {{.CLI_ARGS}}

  events:snapshot:
    desc: Run third-layer SEC EDGAR event snapshot
    cmds:
      - uv run python scripts/run_events_snapshot.py {{.CLI_ARGS}}

  interpretation:graph:
    desc: Run fourth-layer source-backed interpretation LangGraph workflow
    cmds:
      - uv run python scripts/run_interpretation_graph.py {{.CLI_ARGS}}

  hypotheses:graph:
    desc: Run fifth-layer falsifiable hypotheses LangGraph workflow
    cmds:
      - uv run python scripts/run_hypotheses_graph.py {{.CLI_ARGS}}

  validation:graph:
    desc: Run sixth-layer validation LangGraph workflow
    cmds:
      - uv run python scripts/run_validation_graph.py {{.CLI_ARGS}}

  proposal:graph:
    desc: Run seventh-layer structured proposal LangGraph workflow
    cmds:
      - uv run python scripts/run_proposal_graph.py {{.CLI_ARGS}}

  risk-gate:graph:
    desc: Run eighth-layer independent risk gate LangGraph workflow
    cmds:
      - uv run python scripts/run_risk_gate_graph.py {{.CLI_ARGS}}

  execution:graph:
    desc: Run ninth-layer paper execution LangGraph workflow
    cmds:
      - uv run python scripts/run_execution_graph.py {{.CLI_ARGS}}

  post-trade:graph:
    desc: Run tenth-layer post-trade reconciliation LangGraph workflow
    cmds:
      - uv run python scripts/run_post_trade_graph.py {{.CLI_ARGS}}

  ten-layer:graph:
    desc: Run top-level ten-layer FinHarness LangGraph orchestrator
    cmds:
      - uv run python scripts/run_ten_layer_graph.py {{.CLI_ARGS}}

  workflow:daily-evidence:
    desc: Run first-four-layer daily evidence LangGraph workflow
    cmds:
      - uv run python scripts/run_daily_evidence_graph.py {{.CLI_ARGS}}

  lessons:draft:
    desc: Draft lesson candidates from recent receipts (Loop 4 v0; human promotes)
    cmds:
      - uv run python scripts/run_lesson_draft.py {{.CLI_ARGS}}

  lessons:promote:
    desc: "B4: promote a lesson draft into a rule change with lineage (human action)"
    cmds:
      - uv run python scripts/promote_lesson.py {{.CLI_ARGS}}

  rules:audit:
    desc: "B4: list recorded rule changes; fail if any lacks lesson->receipt lineage"
    cmds:
      - uv run python scripts/audit_rule_lineage.py

  trading-state:show:
    desc: Show the persisted behavioral trading state (Loop 3 feedback edge)
    cmds:
      - uv run python -c "from finharness.trading_state_store import load_trading_state; import json; print(json.dumps(load_trading_state().model_dump(mode='json'), indent=2))"

  eval:risk:
    desc: Evaluate generated finance risk note
    cmds:
      - pnpm exec promptfoo eval -c evals/promptfoo/risk-note.yaml --no-cache

  okx:market:
    desc: Fetch read-only OKX public market snapshots
    cmds:
      - uv run python scripts/okx_market_snapshot.py --watchlist --limit 10

  okx:live-status:
    desc: Read live OKX account, configuration, positions, and open orders
    cmds:
      - uv run python scripts/okx_live_status.py

  okx:live-read:
    desc: Run an allowlisted live read-only OKX command, e.g. task okx:live-read -- account balance
    cmds:
      - uv run python scripts/run_okx_read.py {{.CLI_ARGS}}

  okx:demo:
    desc: Run an allowlisted OKX demo command
    cmds:
      - uv run python scripts/run_okx_read.py --demo {{.CLI_ARGS}}

  okx:live-write:
    desc: Place a live OKX order through the fail-closed gate (guard + notional cap + receipt + attestation)
    cmds:
      - uv run python scripts/okx_live_order.py {{.CLI_ARGS}}

  trading:reset-check:
    desc: Evaluate the behavioral trading guard against persisted trading-state
    cmds:
      - uv run python scripts/run_trading_guard.py {{.CLI_ARGS}}

  trading:validation-report:
    desc: Generate RC0.2 trading validation report v1
    cmds:
      - uv run python scripts/generate_trading_validation_report.py

  guard:interactive:
    desc: Evaluate the behavioral guard for a what-if drawdown/loss, e.g. -- --drawdown-pct -3 --consecutive-losses 3
    cmds:
      - uv run python scripts/run_trading_guard.py {{.CLI_ARGS}}

  workflow:cognitive:
    desc: Run LangGraph cognitive engineering flow; pass args with -- --topic "..."
    cmds:
      - uv run python scripts/run_cognitive_flow.py {{.CLI_ARGS}}

  workflow:engineering-delivery:
    desc: Run Engineering Delivery Graph; pass evidence args with -- --goal "..."
    cmds:
      - uv run python scripts/run_engineering_delivery_graph.py {{.CLI_ARGS}}

  alpaca:paper-check:
    desc: Check Alpaca paper account, positions, and open orders
    cmds:
      - uv run python scripts/check_alpaca_paper.py

  alpaca:paper-capabilities:
    desc: Inspect Alpaca paper account configuration, orders, positions, and activities
    cmds:
      - uv run python scripts/alpaca_paper_capabilities.py

  alpaca:paper-config-dry-run:
    desc: Show the broad Alpaca paper experiment configuration payload
    cmds:
      - uv run python scripts/alpaca_paper_configure.py

  alpaca:paper-config-experiment:
    desc: Apply broad Alpaca paper experiment settings
    cmds:
      - uv run python scripts/alpaca_paper_configure.py --apply

  alpaca:paper-assets:
    desc: List active Alpaca paper US equity assets
    cmds:
      - uv run python scripts/alpaca_paper_assets.py --asset-class us_equity --limit 20

  alpaca:paper-crypto-assets:
    desc: List active Alpaca paper crypto assets
    cmds:
      - uv run python scripts/alpaca_paper_assets.py --asset-class crypto --limit 20

  alpaca:paper-option-contracts:
    desc: List Alpaca paper option contracts for SPY
    cmds:
      - uv run python scripts/alpaca_paper_options.py --underlying SPY --limit 20

  alpaca:paper-order-cycle:
    desc: Place and cancel a tiny Alpaca paper limit order
    cmds:
      - uv run python scripts/alpaca_paper_order_cycle.py

  alpaca:paper-strategy-order:
    desc: Run a paper order with written thesis, risk gate, cancel, and receipt
    cmds:
      - uv run python scripts/alpaca_paper_strategy_order.py --execute

  alpaca:paper-dca:
    desc: "Paper DCA accumulation buy (dry-run; add -- --execute to fill). e.g. task alpaca:paper-dca -- --symbols SPY,QQQ --execute"
    cmds:
      - uv run python scripts/alpaca_paper_dca_buy.py {{.CLI_ARGS}}
