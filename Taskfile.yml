version: '3'

env:
  UV_LOCKED: '1'
  PROMPTFOO_DISABLE_TELEMETRY: '1'
  PROMPTFOO_DISABLE_UPDATE: '1'

tasks:
  status:
    desc: Show lab status
    cmds:
      - git status --short
      - uv run python --version
      - pnpm --version
      - find vendor -maxdepth 1 -mindepth 1 -type d -printf '%f\n' | sort

  ideas:list:
    desc: Show Idea Lab backlog
    cmds:
      - cat ideas/backlog.md

  ideas:evolve:
    desc: Run Forward Evolution — cross two ideas from the pool
    cmds:
      - 'echo "TODO: automated evolve — for now, manually review the pool and create a new EXP"'

  setup:
    desc: Sync locked Python and JS dependencies
    cmds:
      - uv sync --locked --all-groups
      - pnpm install --frozen-lockfile

  doctor:
    desc: Verify the locked project environment and canonical editable import path
    cmds:
      - env -u PYTHONPATH uv run --locked python scripts/check_development_environment.py

  issue:start:
    desc: Create a numbered issue branch and sibling worktree from current origin/main
    cmds:
      - uv run python scripts/manage_issue_worktree.py start {{.CLI_ARGS}}

  issue:status:
    desc: Audit issue branch/worktree naming, cleanliness, and stale metadata
    cmds:
      - uv run python scripts/manage_issue_worktree.py status {{.CLI_ARGS}}

  issue:finish:
    desc: Preview or apply safe cleanup for a merged issue worktree
    cmds:
      - uv run python scripts/manage_issue_worktree.py finish {{.CLI_ARGS}}

  issues:audit:
    desc: Audit live open Issues for exactly one plane, kind, and lifecycle label
    cmds:
      - uv run python scripts/audit_issue_taxonomy.py {{.CLI_ARGS}}

  pr:body:
    desc: Render a concise PR body with issue and changed-file metadata
    cmds:
      - uv run python scripts/manage_pr_contract.py render {{.CLI_ARGS}}

  pr:check:
    desc: Validate a rendered PR body file against the repository contract
    cmds:
      - uv run python scripts/manage_pr_contract.py check {{.CLI_ARGS}}

  check:
    desc: Merge gate — run the CI-required verification suite (alias for check:ci)
    cmds:
      - task: check:ci

  check:fast:
    desc: Fast local feedback — lint, typecheck, full Python test gate (compile + unittest + pytest)
    deps:
      - setup
    cmds:
      - task: lint
      - task: typecheck
      - task: test:all

  check:ci:
    desc: CI merge gate — fast checks + base profile + integration + frontend + governance + rules
    cmds:
      - task: check:fast
      - task: deps:probe-base
      - task: test:frontend
      - task: architecture:check
      - task: rules:audit

  check:timed:
    desc: Run the CI merge gate through existing Taskfile stages and record timing evidence
    cmds:
      - python scripts/run_timed_check.py

  check:research:
    desc: Full suite including expensive experiments and eval smoke (not in CI fast path)
    cmds:
      - task: check:ci
      - task: experiments
      - task: eval:smoke

  hardening:gate:
    desc: Run local MVP hardening checks without printing secret material
    cmds:
      - uv run python scripts/run_hardening_gate.py

  capital:reconcile:
    desc: Audit capital-import receipt/DB consistency; pass --apply for safe repairs
    cmds:
      - uv run python scripts/reconcile_capital_imports.py {{.CLI_ARGS}}

  observability:trace:
    desc: Read a local observability trace-index receipt (bounded summary, no raw payloads)
    cmds:
      - uv run python scripts/read_observability_trace.py {{.CLI_ARGS}}

  test:frontend:
    desc: Run jsdom-based frontend DOM tests
    cmds:
      - node frontend/tests/module_boundaries.test.cjs
      - node frontend/tests/revision_history.test.cjs
      - node frontend/tests/ips_policy.test.cjs
      - node frontend/tests/research_evidence.test.cjs
      - node frontend/tests/scaffold_revision.test.cjs
      - node frontend/tests/review_workspace.test.cjs
      - node frontend/tests/review_retrospective.test.cjs
      - node frontend/tests/review_compare.test.cjs
      - node frontend/tests/api_error.test.cjs
      - node frontend/tests/idempotent_mutations.test.cjs
      - node frontend/tests/write_refresh_semantics.test.cjs
      - node frontend/tests/mutation_registry_concurrency.test.cjs
      - node frontend/tests/mutation_acknowledgement_semantics.test.cjs
      - node frontend/tests/mutation_identity_binding.test.cjs
      - node frontend/tests/cockpit_execution.test.cjs
      - node frontend/tests/exposure_unknown_state.test.cjs
      - node frontend/tests/dashboard_unknown_capital.test.cjs

  test:browser:
    desc: D8 real-browser cockpit golden-path smoke (Playwright + Chromium). NOT in `check`; CI-optional execution target.
    cmds:
      - node frontend/tests/browser/cockpit_smoke.test.cjs
      - node frontend/tests/browser/local_review_mode.test.cjs
      - node frontend/tests/browser/browser_mutation_identity_binding.test.cjs
      - node frontend/tests/browser/browser_mutation_response_loss.test.cjs
      - node frontend/tests/browser/browser_stale_proposal_version.test.cjs

  architecture:check:
    desc: Fail on Python import SCCs and direct/transitive architecture boundary violations
    cmds:
      - uv run python scripts/check_architecture_boundaries.py
      - task: mutations:capabilities-check

  mutations:capabilities-check:
    desc: Audit keyed-mutation APIRoutes, recovery capabilities, and resolver dispatch
    cmds:
      - uv run python scripts/check_keyed_mutation_route_capabilities.py

  hardening:redteam:
    desc: Run local adversarial boundary checks
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks redteam

  redteam:tools-check:
    desc: Record local red-team tool readiness
    cmds:
      - uv run python scripts/check_redteam_tool_readiness.py

  redteam:dryrun-config-check:
    desc: Validate promptfoo redteam dry-run contract
    cmds:
      - uv run python scripts/validate_promptfoo_redteam_dryrun.py

  security:scan:
    desc: Run local dependency, gitleaks, and Trivy security scans
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks dependency gitleaks trivy

  security:audit:
    desc: Audit installed dependencies for known advisories (pip-audit; needs network, fail-closed)
    cmds:
      - uv run python scripts/run_hardening_gate.py --checks pip-audit

  security:sbom:
    desc: Generate local SBOM and provenance baseline artifacts
    cmds:
      - uv run python scripts/generate_security_sbom.py

  security:fuzz:
    desc: Run deterministic governance-boundary fuzz baseline
    cmds:
      - |
        UV_PROJECT_ENVIRONMENT=.venv-probes/fuzz \
          uv run --locked --no-default-groups python scripts/run_fuzz_baseline.py

  lint:
    desc: Run Python lint checks
    cmds:
      - uv run ruff check .

  typecheck:
    desc: Static type check (mypy; strict on safety-critical core)
    cmds:
      - uv run mypy

  format:
    desc: Format Python code
    cmds:
      - uv run ruff format .

  test:compile:
    desc: Python compile check
    cmds:
      - uv run python -m py_compile src/finharness/*.py experiments/*.py tests/*.py scripts/*.py

  test:unittest:
    desc: Run unittest discovery suite
    cmds:
      - uv run python -m unittest discover -s tests

  test:pytest:
    desc: Run pytest-only test files from the pytest manifest
    cmds:
      - uv run python scripts/run_pytest_manifest.py

  test:all:
    desc: Complete Python test gate — compile + unittest + pytest
    cmds:
      - task: test:compile
      - task: test:unittest
      - task: test:pytest

  test:
    desc: Compatibility alias for the complete Python test gate
    cmds:
      - task: test:all

  api:serve:
    desc: Serve the persistent local cockpit read-only (writes fail closed)
    cmds:
      - uv run python scripts/serve_local_cockpit.py --mode read-only {{.CLI_ARGS}}

  cockpit:review:
    desc: Serve the loopback-only persistent cockpit with governed human review writes
    cmds:
      - uv run python scripts/serve_local_cockpit.py --mode review {{.CLI_ARGS}}

  personal-finance:import:
    desc: Import a read-only FinHarness-contract personal-finance CSV into state core
    cmds:
      - uv run python scripts/import_personal_finance_export.py {{.CLI_ARGS}}

  beancount:import:
    desc: Mirror a real Beancount ledger (via bean-query) into state core, read-only
    cmds:
      - uv run python scripts/import_beancount_ledger.py {{.CLI_ARGS}}

  db:migrate:
    desc: Apply state-core schema migrations (PRAGMA user_version) to the database
    cmds:
      - uv run python scripts/migrate_state_core.py {{.CLI_ARGS}}

  brief:daily:
    desc: Compute and archive the unified daily brief as a dated receipt
    cmds:
      - uv run python scripts/record_daily_brief.py {{.CLI_ARGS}}

  decisions:scan:
    desc: Scan the exposure map and record capital-allocation candidates as governed proposals (read-only)
    cmds:
      - uv run python scripts/record_decisions.py {{.CLI_ARGS}}

  decisions:research-smoke:
    desc: "MANUAL/ON-DEMAND/NETWORK: opt-in --with-research live smoke on an isolated synthetic sample (NOT in task check)"
    cmds:
      - uv run python scripts/run_research_smoke.py

  benchmark:capital-world:
    desc: Measure bounded local Capital World resolution latency without asserting a production SLO
    cmds:
      - uv run python scripts/benchmark_capital_world.py {{.CLI_ARGS}}

  dogfood:scf-capital:
    desc: Run a read-only Capital World dogfood over the pinned Federal Reserve SCF 2022 public extract
    cmds:
      - uv run python scripts/run_scf_capital_dogfood.py {{.CLI_ARGS}}

  acceptance:capital-review:
    desc: Prove canonical import, blocked-data, governed review, restart, and replay paths
    cmds:
      - uv run python scripts/run_capital_review_acceptance.py {{.CLI_ARGS}}

  decisions:golden-path:
    desc: "MANUAL/DEMO: end-to-end receipt-consumption golden path on an isolated synthetic sample (offline; NOT in task check)"
    cmds:
      - uv run python scripts/run_golden_path.py

  review:annual:
    desc: Record an annual (period) decision retrospective as a dated receipt (read-only; --year optional)
    cmds:
      - uv run python scripts/record_annual_review.py {{.CLI_ARGS}}

  backup:
    desc: Capacity-gated, atomic backup of state-core SQLite and receipts
    cmds:
      - uv run python scripts/backup.py {{.CLI_ARGS}}

  backup:verify:
    desc: Verify backup hashes plus SQLite and receipt-archive restore readability
    cmds:
      - uv run python scripts/verify_backup.py {{.CLI_ARGS}}

  backup:prune:
    desc: Preview retention candidates by default; pass --apply to delete verified candidates
    cmds:
      - uv run python scripts/prune_backups.py {{.CLI_ARGS}}

  identity:reconcile:
    desc: Inspect a pending mutation identity receipt; reconciliation requires --apply
    cmds:
      - uv run python scripts/reconcile_identity_mutation.py {{.CLI_ARGS}}

  cockpit:daily:
    desc: Build a governed deterministic daily portfolio-change brief
    cmds:
      - uv run python scripts/run_daily_change_brief.py {{.CLI_ARGS}}

  experiments:
    desc: Run mature-wheel local backtest experiments
    cmds:
      - uv run python experiments/riskfolio_allocation.py

  wheels:size:
    desc: Show local wheel sizes
    cmds:
      - du -sh vendor/* 2>/dev/null | sort -h

  docs:list:
    desc: List project docs
    cmds:
      - find docs -type f | sort

  docs:generate-current-views:
    desc: Regenerate catalog-owned architecture and inventory views
    cmds:
      - uv run python scripts/sync_current_docs.py

  docs:current-check:
    desc: Check maintained docs against live task/module facts
    cmds:
      - uv run python scripts/sync_current_docs.py --check
      - uv run python -m unittest tests.test_current_doc_generation
      - uv run python -m unittest tests.test_system_catalog
      - uv run python -m unittest tests.test_evolution_roadmap

  vocab:lint:
    desc: Advisory controlled-vocabulary lint for formal docs and code strings
    cmds:
      - uv run python scripts/vocab_lint.py {{.CLI_ARGS}}

  smoke:
    desc: Run a minimal Python smoke test
    cmds:
      - task: test
      - task: experiments

  wheels:check:
    desc: Check installed top wheels
    cmds:
      - uv run python scripts/check_python_wheels.py
      - pnpm exec promptfoo --version

  wheels:data-check:
    desc: Check installed wheels plus provider-backed network data
    cmds:
      - uv run python scripts/check_python_wheels.py --network
      - pnpm exec promptfoo --version

  agent:describe:
    desc: Describe registered OpenAI Agents SDK tools
    cmds:
      - uv run python scripts/describe_agent_tools.py {{.CLI_ARGS}}

  agent:run:
    desc: Run the real agent when OPENAI_API_KEY is configured
    cmds:
      - uv run python scripts/run_agent_once.py {{.CLI_ARGS}}

  agent:work-loop-acceptance:
    desc: "EXPECTED RED: require Agent Work Loop semantic closure (not in task check)"
    cmds:
      - uv run python scripts/run_agent_work_loop_acceptance.py

  agent:work-loop-acceptance-report:
    desc: Report Agent Work Loop semantic gaps without failing the command
    cmds:
      - uv run python scripts/run_agent_work_loop_acceptance.py --report-only

  eval:smoke:
    desc: Run promptfoo local echo eval
    cmds:
      - pnpm exec promptfoo eval -c evals/promptfoo/echo.yaml --no-cache

  eval:redteam-boundary:
    desc: Export and run local promptfoo red-team boundary corpus smoke eval
    cmds:
      - uv run python scripts/export_redteam_artifacts.py
      - pnpm exec promptfoo eval -c evals/promptfoo/redteam-boundary.yaml --no-cache

  lessons:draft:
    desc: Draft lesson candidates from recent receipts (Loop 4 v0; human promotes)
    cmds:
      - uv run python scripts/run_lesson_draft.py {{.CLI_ARGS}}

  lessons:promote:
    desc: "B4: promote a lesson draft into a rule change with lineage (human action)"
    cmds:
      - uv run python scripts/promote_lesson.py {{.CLI_ARGS}}

  rules:audit:
    desc: "B4: list recorded rule changes; fail if any lacks lesson->receipt lineage"
    cmds:
      - uv run python scripts/audit_rule_lineage.py

  deps:probe-base:
    desc: "Prove base runtime imports work without optional deps"
    cmds:
      - |
        VENV=.venv-probes/base
        rm -rf "$VENV"
        UV_PROJECT_ENVIRONMENT="$VENV" uv sync --locked --no-default-groups
        "$VENV/bin/python" scripts/probe_base_runtime.py

  deps:probe-data:
    desc: "Prove data group packages are importable"
    cmds:
      - |
        VENV=.venv-probes/data
        rm -rf "$VENV"
        UV_PROJECT_ENVIRONMENT="$VENV" uv sync --locked --no-default-groups --group data
        "$VENV/bin/python" scripts/probe_dependency_group.py data

  deps:probe-research:
    desc: "Prove research group packages are importable"
    cmds:
      - |
        VENV=.venv-probes/research
        rm -rf "$VENV"
        UV_PROJECT_ENVIRONMENT="$VENV" uv sync --locked --no-default-groups --group research
        "$VENV/bin/python" scripts/probe_dependency_group.py research

  deps:probe-agent:
    desc: "Prove the agent profile (base + data + research + agent) is importable"
    cmds:
      - |
        VENV=.venv-probes/agent
        rm -rf "$VENV"
        UV_PROJECT_ENVIRONMENT="$VENV" uv sync --locked --no-default-groups --group data --group research --group agent
        "$VENV/bin/python" scripts/probe_dependency_group.py agent

  deps:probe-eval:
    desc: "Prove eval group packages are importable"
    cmds:
      - |
        VENV=.venv-probes/eval
        rm -rf "$VENV"
        UV_PROJECT_ENVIRONMENT="$VENV" uv sync --locked --no-default-groups --group eval
        "$VENV/bin/python" scripts/probe_dependency_group.py eval

  deps:probe-all:
    desc: "Run all isolated dependency probes"
    cmds:
      - task: deps:probe-base
      - task: deps:probe-data
      - task: deps:probe-research
      - task: deps:probe-agent
      - task: deps:probe-eval

  eval:risk:
    desc: Evaluate generated finance risk note
    cmds:
      - pnpm exec promptfoo eval -c evals/promptfoo/risk-note.yaml --no-cache

  workflow:cognitive:
    desc: Run LangGraph cognitive engineering flow; pass args with -- --topic "..."
    cmds:
      - uv run python scripts/run_cognitive_flow.py {{.CLI_ARGS}}

  workflow:engineering-delivery:
    desc: Run Engineering Delivery Graph; pass evidence args with -- --goal "..."
    cmds:
      - uv run python scripts/run_engineering_delivery_graph.py {{.CLI_ARGS}}
