schema: finharness.architecture_layers.v1
source_roots:
  - src
  - scripts
  - experiments

# Conceptual ownership and dependency truth. This extends the existing matrix;
# it does not replace the code-level import layers and rules below.
plane_model:
  schema: finharness.plane_model.v1
  dependency_semantics: depends_on names lower-rank semantic inputs; outputs never write backward without readmission.
  planes:
    - name: truth
      kind: domain
      dependency_rank: 0
      purpose: Admit trustworthy, versioned facts about the person's capital world.
      canonical_inputs: [external SourceArtifact records, valuation inputs, reconciliation artifacts and results awaiting truth admission]
      canonical_outputs: [admitted CapitalState versions, capital-truth findings]
      owned_objects: [ImportBatch, ImportManifest, CapitalStateVersion, CapitalTruthAdmission]
      forbidden_responsibilities: [admitted Knowledge output consumption, evidence interpretation, decision choice, authority grant, user workflow]
      depends_on: []
    - name: knowledge
      kind: domain
      dependency_rank: 0
      purpose: Admit observations and claims with provenance, uncertainty, and counter-evidence.
      canonical_inputs: [external SourceArtifact records, external observations, research outputs]
      canonical_outputs: [admitted EvidenceSet versions, evidence gaps and conflicts]
      owned_objects: [Observation, Claim, EvidenceSetVersion, EvidenceAdmission]
      forbidden_responsibilities: [admitted Truth output consumption, capital-state totals, decision choice, authority grant, external effect]
      depends_on: []
    - name: control
      kind: domain
      dependency_rank: 1
      purpose: Resolve principal identity, mandate, authority, capability, and admission limits.
      canonical_inputs: [human constitutional choices, admitted capital truth, authenticated principal context]
      canonical_outputs: [effective mandate and authority views, typed admission decisions]
      owned_objects: [Principal, CapitalMandateVersion, PolicyVersion, AgentAuthorityGrant, AdmissionDecision]
      forbidden_responsibilities: [capital fact creation, evidence interpretation, strategy choice, effect execution]
      depends_on: [truth]
    - name: judgment
      kind: domain
      dependency_rank: 2
      purpose: Compare scenarios and risk to produce a version-bound human capital decision.
      canonical_inputs: [admitted CapitalState versions, admitted EvidenceSet versions, effective control views]
      canonical_outputs: [DecisionCase versions, decision readiness and validity, recorded decisions]
      owned_objects: [ProposalVersion, DecisionCaseVersion, ScenarioVersion, ReviewStateVersion, DecisionReadiness, DecisionValidity, DecisionRecord]
      forbidden_responsibilities: [source ingestion, authority expansion, Agent runtime control, effect execution]
      depends_on: [truth, knowledge, control]
    - name: agent
      kind: domain
      dependency_rank: 3
      purpose: Perform bounded observation, reasoning, tool use, replanning, and human handoff.
      canonical_inputs: [admitted truth and evidence, judgment context, effective control views]
      canonical_outputs: [typed work results, candidates, gaps, escalations and handoffs]
      owned_objects: [AgentWorkRequest, AgentWorkObservation, AgentWorkResult, HumanHandoff]
      forbidden_responsibilities: [canonical fact mutation, human decision impersonation, authority self-grant, direct external effect]
      depends_on: [truth, knowledge, judgment, control]
    - name: action-learning
      kind: domain
      dependency_rank: 4
      purpose: Execute admitted actions through deterministic engines and review outcomes without automatic policy mutation.
      canonical_inputs: [valid decisions, effective control views, admitted action requests, reconciled outcome facts]
      canonical_outputs: [effect and reconciliation results, OutcomeReview, LessonCandidate]
      owned_objects: [ActionRequest, EffectResult, OutcomeReview, LessonCandidate]
      forbidden_responsibilities: [decision authorship, authority expansion, automatic policy update, unadmitted fact writeback]
      depends_on: [truth, knowledge, judgment, control, agent]
    - name: product
      kind: domain
      dependency_rank: 5
      purpose: Let a human discover, compare, decide, return, review, and learn without internal proof vocabulary.
      canonical_inputs: [domain read models, review commands, Agent handoffs, outcome views]
      canonical_outputs: [human commands, explanations, presentation and session state, navigation]
      owned_objects: [DecisionWorkspace, ReviewJourney, RecoverySurface, ProductExplanation]
      forbidden_responsibilities: [canonical domain truth, policy inference, hidden authority, duplicated domain workflow]
      depends_on: [truth, knowledge, judgment, control, agent, action-learning]
    - name: assurance
      kind: horizontal
      purpose: Supply transactions, recovery, indexes, security, CI, observability, and falsifiable proof.
      canonical_inputs: [domain invariants, failure models, repository and runtime events]
      canonical_outputs: [mechanical guarantees, degraded-state evidence, verification results]
      owned_objects: [IntegrityReceipt, RecoveryProof, ArchitectureAudit, VerificationManifest]
      forbidden_responsibilities: [product roadmap, capital semantics, decision policy, permanent Program ownership]
      depends_on: []
      supports: [truth, knowledge, control, judgment, agent, action-learning, product]

  # Identity and version truth extends the plane model rather than creating a
  # second registry. Domain/version mechanics stay declarative in this ADR
  # phase; runtime resolvers and persistence remain separate Issues.
  identity_model:
    schema: finharness.identity_version_graph.v1
    external_source_identity:
      standard: W3C PROV-DM qualified name
      canonical_key: [source_namespace, source_native_id]
      shared_reference_planes: [truth, knowledge]
      non_authoritative_tokens: [display_id, request_id, local_alias, path]
    namespaces:
      - name: principal
        authority: authenticated principal context
      - name: agent-runtime
        authority: bounded runtime invocation only
      - name: request
        authority: correlation and idempotency only
      - name: external-source
        authority: qualified external source key
      - name: domain-logical
        authority: owning domain logical-identity boundary
      - name: domain-version
        authority: owning domain version-creation boundary; encoded as RFC 9562 UUIDv7
      - name: git-commit
        authority: repository object and workflow identity only
    namespace_substitution_policy: forbidden_unless_explicitly_allowed
    allowed_namespace_substitutions: []
    substitution_barriers:
      - source: agent-runtime
        cannot_replace: [principal]
      - source: request
        cannot_replace: [principal, external-source, domain-logical, domain-version]
      - source: display_id
        cannot_replace: [principal, external-source, domain-logical, domain-version]
      - source: local_alias
        cannot_replace: [external-source, domain-logical, domain-version]
      - source: path
        cannot_replace: [external-source]
      - source: content_digest
        cannot_replace: [domain-version]
      - source: git-commit
        cannot_replace: [principal, external-source, domain-logical, domain-version]
    version_graph:
      edge_semantics: depends_on names immutable upstream identity inputs
      nodes:
        - name: CapitalStateVersion
          owner_plane: truth
          identity_namespace: domain-version
          history: immutable
          depends_on: []
          may_cite: []
        - name: EvidenceSetVersion
          owner_plane: knowledge
          identity_namespace: domain-version
          history: immutable
          depends_on: []
          may_cite: []
        - name: PolicyVersion
          owner_plane: control
          identity_namespace: domain-version
          history: immutable
          depends_on: []
          may_cite: []
        - name: ProposalVersion
          owner_plane: judgment
          identity_namespace: domain-version
          history: immutable
          depends_on: []
          may_cite: []
        - name: DecisionCaseVersion
          owner_plane: judgment
          identity_namespace: domain-version
          history: immutable
          depends_on: [CapitalStateVersion, EvidenceSetVersion, PolicyVersion, ProposalVersion]
          may_cite: []
        - name: ScenarioVersion
          owner_plane: judgment
          identity_namespace: domain-version
          history: immutable
          depends_on: [DecisionCaseVersion]
          may_cite: []
        - name: ReviewStateVersion
          owner_plane: judgment
          identity_namespace: domain-version
          history: immutable
          depends_on: [DecisionCaseVersion]
          may_cite: []
        - name: DecisionRecord
          owner_plane: judgment
          identity_namespace: domain-logical
          history: append-only
          depends_on: [DecisionCaseVersion]
          may_cite: [ScenarioVersion]
      currentness_owner_semantics: affected_node.owner_plane
      freshness_rules:
        - trigger: capital_state_admission
          trigger_owner_plane: truth
          affects: [CapitalStateVersion, DecisionCaseVersion, ScenarioVersion]
        - trigger: evidence_admission_or_withdrawal
          trigger_owner_plane: knowledge
          affects: [EvidenceSetVersion, DecisionCaseVersion, ScenarioVersion]
        - trigger: policy_activation
          trigger_owner_plane: control
          affects: [PolicyVersion, DecisionCaseVersion, ScenarioVersion]
        - trigger: proposal_revision
          trigger_owner_plane: judgment
          affects: [ProposalVersion, DecisionCaseVersion, ScenarioVersion]
        - trigger: case_basis_change
          trigger_owner_plane: judgment
          affects: [DecisionCaseVersion, ScenarioVersion]
        - trigger: scenario_recalculation
          trigger_owner_plane: judgment
          affects: [ScenarioVersion]
        - trigger: review_event
          trigger_owner_plane: judgment
          affects: [ReviewStateVersion]
        - trigger: decision_recorded
          trigger_owner_plane: judgment
          affects: [DecisionRecord]

  # Record roles are explicit authority contracts, not a shared runtime base
  # class or a classifier inferred from names, paths, tables, or JSON shapes.
  record_taxonomy:
    schema: finharness.record_taxonomy.v1
    enforcement:
      classification: explicit_contract_only
      universal_base_class: forbidden
      inference_from_name_path_or_storage: forbidden
    categories:
      - name: DomainRecord
        purpose: authoritative domain fact, state transition, or decision history
        truth_owner: owning domain plane
        authoritative_source: owning domain write or admission boundary
        mutability: immutable version or append-only domain history
        retention: domain and legal lifecycle; independent of projection rebuild
        reconstruction: authoritative domain history or verified source replay only
        allowed_references: [DomainRecord, ArtifactProvenance, OperationReceipt]
        domain_authority_effect: owning domain policy only
        decision_validity_effect: Judgment-owned DomainRecord policy only
        financial_evidence_admission: owning domain admission boundary only
      - name: OperationReceipt
        purpose: integrity-bound operation attempt, outcome, retry, and recovery evidence
        truth_owner: bounded operation producer
        authoritative_source: operation boundary and typed reconciliation resolver
        mutability: append-only or integrity-linked pending-to-terminal transitions
        retention: retry, recovery, and audit horizon; extended while referenced
        reconstruction: typed reconciliation may record outcome but cannot fabricate domain effect
        allowed_references: [DomainRecord, OperationReceipt, ArtifactProvenance, AgentRunTrace]
        domain_authority_effect: none
        decision_validity_effect: none
        financial_evidence_admission: not admissible by receipt presence
      - name: ArtifactProvenance
        purpose: immutable artifact origin, derivation, attribution, and integrity binding
        truth_owner: artifact producer or qualified external source
        authoritative_source: W3C PROV-aligned generation and derivation boundary
        mutability: immutable statements with append-only correction or invalidation
        retention: at least the subject artifact and applicable evidence lifecycle
        reconstruction: only from verifiable entities, activities, agents, and source bytes
        allowed_references: [DomainRecord, OperationReceipt, ArtifactProvenance]
        domain_authority_effect: none
        decision_validity_effect: none
        financial_evidence_admission: explicit Knowledge or Truth policy required
      - name: AgentRunTrace
        purpose: ordered durable execution history of one bounded Agent runtime invocation
        truth_owner: Agent runtime
        authoritative_source: durable unsampled Agent runtime trace and event boundary
        mutability: append-only canonical trace events with one terminal run outcome
        retention: Agent recovery and audit lifecycle with policy-governed redaction
        reconstruction: canonical persisted trace records and referenced immutable artifacts; never sampled telemetry
        allowed_references: [DomainRecord, OperationReceipt, ArtifactProvenance, AgentRunTrace]
        domain_authority_effect: none
        decision_validity_effect: none
        financial_evidence_admission: explicit domain policy required
      - name: BuildAttestation
        purpose: authenticated claim binding a build or verification predicate to subjects
        truth_owner: authenticated build or verification system
        authoritative_source: in-toto Statement and SLSA predicate issued by the builder
        mutability: immutable authenticated statement; supersession creates a new statement
        retention: subject artifact, release, and verification lifecycle
        reconstruction: rerun or authenticated reissue; never regenerate from PR prose
        allowed_references: [ArtifactProvenance, BuildAttestation]
        domain_authority_effect: none
        decision_validity_effect: none
        financial_evidence_admission: explicit domain policy required
      - name: ProjectionIndex
        purpose: disposable discovery or query acceleration over authoritative records
        truth_owner: none; upstream category remains authoritative
        authoritative_source: declared upstream records at a bound generation or high-water mark
        mutability: replaceable and directly non-authoritative
        retention: disposable; delete and rebuild under lifecycle policy
        reconstruction: deterministic rebuild from authoritative sources at a bound generation
        allowed_references: [DomainRecord, OperationReceipt, ArtifactProvenance, AgentRunTrace, BuildAttestation]
        domain_authority_effect: none
        decision_validity_effect: none
        financial_evidence_admission: never by index presence
    agent_trace_observability_export:
      standard: OpenTelemetry-aligned spans, links, events, and terminal status
      authority: non-authoritative export of AgentRunTrace
      sampling: permitted for observability export only
      redaction: policy governed
      cannot_satisfy:
        - canonical trace completeness
        - restart hydration
        - domain authority
        - decision validity
        - financial evidence admission
    surface_migrations:
      - surface: statecore_receipt_backed_domain_writes
        components:
          - component: canonical_domain_state
            current_role: receipt-backed canonical domain payload or state history
            current_conformance: partial
            target_category: DomainRecord
            owner_issues: [258, 267, 268, 269, 270, 271]
            completed_prerequisites: []
            disposition: preserve history and move authority to existing domain write and admission boundaries
          - component: mutation_operation_evidence
            current_role: mutation attempt, terminal outcome, retry, and reconciliation evidence
            current_conformance: partial
            target_category: OperationReceipt
            owner_issues: [383]
            completed_prerequisites: []
            disposition: retain operation identity and reconciliation semantics without granting domain authority
          - component: receipt_discovery_index
            current_role: lookup rows over canonical receipt or artifact bytes
            current_conformance: partial
            target_category: ProjectionIndex
            owner_issues: [395]
            completed_prerequisites: []
            disposition: rebuild from authoritative inventory and prune stale entries at a bound generation
      - surface: receipt_index
        components:
          - component: generic_receipt_index_rows
            current_role: replaceable discovery projection over canonical receipt or artifact inventory
            current_conformance: partial
            target_category: ProjectionIndex
            owner_issues: [395]
            completed_prerequisites: []
            disposition: preserve as rebuildable projection and reject stale or dangling entries after successful rebuild
      - surface: agent_receipt_search
        components:
          - component: search_generation_index
            current_role: generated search projection over retained Agent records
            current_conformance: partial
            target_category: ProjectionIndex
            owner_issues: [367]
            completed_prerequisites: []
            disposition: keep generation-bound search state rebuildable and non-authoritative
      - surface: agent_run_receipt_and_trace_sink
        components:
          - component: canonical_agent_run_trace
            current_role: compatibility receipt and trace paths for one Agent work request
            current_conformance: partial
            target_category: AgentRunTrace
            owner_issues: [291]
            completed_prerequisites: []
            disposition: consolidate compatibility paths into one durable ordered canonical run trace
      - surface: legacy_attestation
        components:
          - component: historical_review_evidence
            current_role: retained historical human review and attestation evidence
            current_conformance: partial
            target_category: DomainRecord
            owner_issues: [273]
            completed_prerequisites: []
            disposition: preserve historical readability without treating legacy attestation as current decision truth
          - component: current_decision_truth
            current_role: legacy consumers treating attestation as current decision or authority truth
            current_conformance: not_yet_conforming
            target_category: DomainRecord
            owner_issues: [271, 272, 273]
            completed_prerequisites: []
            disposition: migrate current truth to canonical DecisionRecord and authority provenance while retaining compatibility reads
      - surface: artifact_descriptor_and_import_provenance
        components:
          - component: immutable_artifact_descriptor
            current_role: immutable artifact identity, source bytes, derivation, and integrity binding
            current_conformance: partial
            target_category: ArtifactProvenance
            owner_issues: [368, 371, 373, 376, 394]
            completed_prerequisites: []
            disposition: adopt shared immutable artifact and qualified external-source boundaries
      - surface: keyed_mutation_identity_receipt
        components:
          - component: keyed_mutation_state_machine
            current_role: request ownership, pending claim, terminal outcome, replay, and typed reconciliation evidence
            current_conformance: partial
            target_category: OperationReceipt
            owner_issues: [383, 385, 387, 388, 389]
            completed_prerequisites: []
            disposition: retain the keyed-mutation state machine while preventing receipt presence from proving domain effect
      - surface: commit_identity_manifest_and_ci_artifacts
        components:
          - component: commit_identity_verification_manifest
            current_role: repository verification JSON artifact binding claim, repository, commit SHA, ref type, command, and result
            current_conformance: not_yet_conforming
            target_category: BuildAttestation
            owner_issues: [379]
            completed_prerequisites: [386]
            disposition: preserve existing commit-identity evidence as compatibility input; future owner must add authenticated subject and predicate semantics before claiming BuildAttestation conformance
      - surface: market_data_and_import_receipts
        components:
          - component: admitted_market_or_capital_state
            current_role: domain state admitted from validated market or import data
            current_conformance: partial
            target_category: DomainRecord
            owner_issues: [258]
            completed_prerequisites: []
            disposition: keep admitted financial truth behind the owning Truth admission boundary
          - component: import_operation_outcome
            current_role: import attempt, validation result, failure, retry, and recovery evidence
            current_conformance: partial
            target_category: OperationReceipt
            owner_issues: [373, 376]
            completed_prerequisites: []
            disposition: separate import outcome evidence from admitted financial truth
          - component: imported_source_provenance
            current_role: imported source identity, bytes, manifest, lineage, and derivation
            current_conformance: partial
            target_category: ArtifactProvenance
            owner_issues: [373, 376, 394]
            completed_prerequisites: []
            disposition: preserve source provenance under the shared qualified-source identity boundary

  # Mature runtimes own Agent mechanics; FinHarness retains capital-domain
  # meaning, admission, authority, canonical evidence, and human review.
  agent_harness_boundary:
    schema: finharness.agent_harness_boundary.v1
    primary_runtime_path:
      current_harness_owner: finharness.agent_work_loop
      selection_point: AgentWorkDecisionPort
      selection_issue: 287
      selection_state: future_adoption_decision
      adapter_mode: single_next_action_decision
      decision_cardinality: one dispatch or complete per invocation
      harness_loop_owner: finharness.agent_work_loop.run_bounded_tool_dispatch_loop
      parallel_core_loops: forbidden
      sdk_runner_loop_on_primary_path: forbidden
      runtime_internal_tool_execution: forbidden
      runtime_internal_handoffs: forbidden
      provider_dependency: separate_adoption_decision_required
      candidates: [direct Responses API, OpenAI Agents SDK]
      tool_calls_return_as: AgentWorkToolRequest
      all_tool_dispatch_must_cross:
        - Harness autonomy admission
        - Harness tool and capability admission
        - Harness work budgets
        - canonical Observation reduction
    mature_runtime_capabilities:
      - model turn loop
      - tool execution
      - handoffs
      - sessions
      - streaming events
      - tracing
    delegated_behind_current_decision_port:
      - one model inference or decision turn
      - typed candidate tool-call decoding
      - provider transport retry
      - token and request usage accounting
      - non-authoritative observability export
    finharness_owned_semantics:
      - server-resolved ContextWorld and exact domain-version binding
      - CapitalState and DecisionCase meaning
      - evidence admissibility and claim-source policy
      - tool visibility, admission, and dispatch policy
      - authority and autonomy admission
      - stale-world replan policy
      - independent budgets and stop or escalation policy
      - domain evaluation and readiness
      - canonical durable AgentRunTrace and operation receipts
      - human review, correction, and handoff
    provider_state:
      authority: non-authoritative runtime state
      durability:
        - ephemeral when no resume obligation exists
        - durable while active pause, resume, or recovery obligation exists
      retention:
        may_prune_after:
          - terminal outcome persisted
          - canonical trace reconciliation complete
          - pending human approval resolved or expired
      must_bind: [ContextWorld version, provider and agent definition version]
      cannot_replace: [ContextWorld, CapitalStateVersion, DecisionCaseVersion, EvidenceSetVersion, PolicyVersion, AgentRunTrace, DomainRecord]
    model_output:
      classification: candidate only until deterministic owning-domain admission
      allowed_outputs: [candidate evidence, data gaps, Scenario request, proposal draft, human handoff]
      prohibited_effects: [domain truth mutation, evidence self-admission, authority grant, decision-of-record write, execution authorization, external effect]
      execution_allowed: false
    mcp_boundary:
      owner_issue: 300
      lifecycle: deferred
      may_own: [protocol capability negotiation, tools/resources/prompts discovery, protocol lifecycle, transport errors, transport authentication, OAuth token and scope mechanics, resource-server access decision]
      finharness_must_own: [approved MCP server allowlist, accepted scope policy, Principal binding, context trust, tool visibility and admission, evidence admission, CapitalMandate, AgentAuthorityGrant, domain truth, decision validity, execution permission, canonical receipts]
      transport_authorization_cannot_substitute_for: [principal identity, mandate, grant, tool admission, evidence admission, execution authority]
    workflow_engine_boundary:
      activation: measured long-running resume, retry, interrupt, scheduling, or compensation need plus separate adoption decision
      may_own: [checkpoint mechanics, resume mechanics, scheduling transport, durable interrupts, compensation orchestration]
      cannot_own: [CapitalState meaning, DecisionCase meaning, evidence admission, authority policy, stale-world policy, domain evaluation, execution permission]
      default_core_dependency: forbidden
    first_evaluation_task:
      name: concentration decision contribution
      input_root:
        type: server-resolved ContextWorld
        owner_issue: 284
        caller_supplied_world_refs: forbidden
      exact_case:
        type: DecisionCaseVersion
        basis_match: required
      required_case_basis: [CapitalStateVersion, EvidenceSetVersion, PolicyVersion, ProposalVersion]
      basis_resolution:
        source: exact DecisionCaseVersion depends_on
        match: required for every required_case_basis member
        independent_latest_or_current_selection: forbidden
      authority_context:
        source: exact ContextWorld
        includes: [Principal, CapitalMandateVersion, AgentAuthorityGrantVersion]
      mixed_basis: forbidden
      freshness_without_basis_match: insufficient
      allowed_outputs: [candidate evidence, data gaps, Scenario request, proposal draft, human handoff]
      evaluation_criteria:
        - exact world and domain-version freshness
        - evidence lineage and admission status
        - deterministic concentration facts separated from model interpretation
        - uncertainty, counter-evidence, and data gaps
        - Scenario request when the current basis is insufficient
        - policy and mandate constraints treated as deterministic inputs
        - bounded stop, escalation, and human handoff
        - candidate-only result with no execution authority
      direct_domain_mutation: forbidden
      execution_allowed: false
      implementation_state: not_yet_conforming
      implementation_owner_issue: 279
      prerequisite_issues: [284, 291]

# First match wins. Keep narrow ownership rules before the core fallback.
layers:
  - name: statecore
    module_globs: ["finharness.statecore", "finharness.statecore.*"]
  - name: api_frontend
    module_globs: ["finharness.api", "finharness.api.*"]
  - name: execution
    module_globs: ["finharness.execution", "finharness.execution.*"]
  - name: product
    module_globs:
      - "finharness.agent_shell"
  - name: agent
    module_globs:
      - "finharness.agent_*"
      - "finharness.hermes_bridge"
      - "finharness.autonomy_*"
  - name: research
    module_globs:
      - "finharness.research_*"
      - "finharness.market_data"
      - "finharness.data_catalog"
      - "finharness.data_quality"
  - name: decisioning
    module_globs:
      - "finharness.decision_*"
      - "finharness.review_*"
      - "finharness.proposal_*"
  - name: legacy
    module_globs:
      - "finharness.paper_validation"
      - "finharness.paper_validation_*"
  - name: archive
    module_globs: ["experiments.archive", "experiments.archive.*"]
  - name: core
    module_globs: ["finharness", "finharness.*", "scripts.*", "experiments.*"]

# Capability identity is declared once here and consumed by rules below. The
# checker does not infer effects from file names, symbols, or source text.
capabilities:
  - id: execution.broker_registry_resolution
    owner_layer: execution
    semantics: Register or resolve a broker adapter selected for an execution order.
    provider_modules:
      - finharness.execution.broker
  - id: execution.broker_submission
    owner_layer: execution
    semantics: Invoke the canonical broker submission command or an adapter submission implementation.
    provider_modules:
      - finharness.execution.commands
      - finharness.execution.adapters.simulated_broker
  - id: statecore.canonical_mutation
    owner_layer: statecore
    semantics: Execute a canonical StateCore write, upsert, materialization, or mutation lifecycle.
    provider_modules:
      - finharness.statecore.agent_authority_grants
      - finharness.statecore.capital_mandates
      - finharness.statecore.proposals
      - finharness.statecore.receipt_index
      - finharness.statecore.snapshot_ingest
      - finharness.statecore.store

# No current path requires an exception. Future exceptions must be exact,
# capability-specific, Issue-owned, and review-gated.
capability_exceptions: []

rules:
  - id: statecore-is-foundational
    source_layers: [statecore]
    forbidden_target_layers: [api_frontend, agent, research, legacy, archive]
  - id: execution-does-not-call-agent
    source_layers: [execution]
    forbidden_target_layers: [agent, archive]
  - id: agent-does-not-bypass-execution-commands
    source_layers: [agent]
    forbidden_target_capabilities:
      - execution.broker_registry_resolution
      - execution.broker_submission
    forbidden_target_modules:
      - "finharness.execution.services"
      - "finharness.execution.adapters.*"
  - id: research-does-not-write-state-or-execute
    source_layers: [research]
    forbidden_target_capabilities:
      - statecore.canonical_mutation
    forbidden_target_modules:
      - "finharness.execution.commands"
      - "finharness.execution.services"
      - "finharness.execution.adapters.*"
  - id: canonical-does-not-call-legacy-write-services
    source_layers: [statecore, decisioning, execution, product, agent, research, core]
    forbidden_target_modules:
      - "finharness.paper_validation"
  - id: api-does-not-call-archive
    source_layers: [api_frontend]
    forbidden_target_layers: [archive]
